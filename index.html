<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChemExam Assistant MEGA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ===== БАЗОВЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --bg-gradient-start: #0a0a0a;
            --bg-gradient-end: #1a1a2e;
            --text-color: white;
            --text-secondary: #b0b0b0;
            --card-bg: rgba(26, 26, 26, 0.9);
            --header-bg: rgba(26, 26, 26, 0.95);
            --border-color: rgba(0, 212, 255, 0.2);
            --progress-bg: rgba(51, 51, 51, 0.8);
            --base-font-size: 16px;
            --success: #00ff88;
            --danger: #ff4444;
            --warning: #ffaa00;
            --info: #00d4ff;
            --accent: #00d4ff;
            --xp-color: #ffaa00;
            --level-color: #9b59b6;
        }

        body.light-theme {
            --bg-gradient-start: #f5f7fa;
            --bg-gradient-end: #e6e9f0;
            --text-color: #1a1a2e;
            --text-secondary: #4a4a6a;
            --card-bg: rgba(255, 255, 255, 0.95);
            --header-bg: rgba(255, 255, 255, 0.95);
            --border-color: rgba(0, 212, 255, 0.4);
            --progress-bg: rgba(0, 0, 0, 0.1);
        }

        body.neon-theme {
            --bg-gradient-start: #000000;
            --bg-gradient-end: #0a0a1a;
            --text-color: #ffffff;
            --text-secondary: #b0f0ff;
            --card-bg: rgba(0, 20, 40, 0.95);
            --header-bg: rgba(0, 10, 20, 0.98);
            --border-color: rgba(0, 255, 255, 0.6);
            --progress-bg: rgba(0, 50, 100, 0.8);
            --accent: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        body.pastel-theme {
            --bg-gradient-start: #ffd1dc;
            --bg-gradient-end: #c1e1c1;
            --text-color: #4a4a4a;
            --text-secondary: #6b6b6b;
            --card-bg: rgba(255, 255, 255, 0.98);
            --header-bg: rgba(255, 255, 255, 0.98);
            --border-color: rgba(255, 182, 193, 0.6);
            --progress-bg: rgba(200, 200, 200, 0.4);
            --accent: #ff9eb5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-color);
            overflow-x: hidden;
            height: 100vh;
            height: -webkit-fill-available;
            position: relative;
            transition: background-color 0.3s ease, border-color 0.3s ease;
            font-size: var(--base-font-size);
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Частицы на фоне */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.3;
            animation: float 20s infinite linear;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.03) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(155, 89, 182, 0.03) 0%, transparent 30%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 10px);
            pointer-events: none;
            z-index: 0;
        }

        #app {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* Скелетон загрузки */
        .skeleton {
            background: linear-gradient(90deg, 
                rgba(0,212,255,0.1) 25%, 
                rgba(0,212,255,0.2) 50%, 
                rgba(0,212,255,0.1) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
            height: 20px;
            margin: 10px 0;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-color);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 212, 255, 0.1);
            border-top: 3px solid var(--accent);
            border-right: 3px solid #9b59b6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px var(--accent);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .logo-text {
            font-size: 1.125rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent), #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--accent);
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.875rem;
            padding: 8px 12px;
            border-radius: 20px;
            transition: background-color 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(0,212,255,0.1);
        }

        .global-progress {
            height: 4px;
            background: rgba(255,255,255,0.1);
            width: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
        }
        .global-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #9b59b6);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent);
        }

        /* XP Bar */
        .xp-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }

        .xp-bar {
            flex: 1;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--xp-color), #ff6600);
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .xp-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0.1) 0%,
                rgba(255,255,255,0.3) 50%,
                rgba(255,255,255,0.1) 100%);
            animation: shimmer 2s infinite;
        }

        .level-badge {
            background: linear-gradient(135deg, var(--level-color), #8e44ad);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            box-shadow: 0 0 10px var(--level-color);
        }

        .main-content {
            padding: 16px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 70px;
            scroll-behavior: smooth;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, border-color 0.3s ease;
            animation: fadeInUp 0.5s ease;
            position: relative;
            overflow: hidden;
            color: var(--text-color);
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 12px 48px rgba(0,212,255,0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .card:hover::before {
            opacity: 1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            background: linear-gradient(135deg, var(--accent), #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        h2 {
            color: var(--text-color);
            font-size: 1.25rem;
            margin-bottom: 12px;
            font-weight: 600;
            position: relative;
            display: inline-block;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            border-radius: 2px;
        }

        h3 {
            color: var(--text-color);
            font-size: 1rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
            font-size: 0.875rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 20px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.9375rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            width: 100%;
            touch-action: manipulation;
            min-height: 48px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #0099cc);
            color: white;
            box-shadow: 0 4px 15px var(--accent);
        }

        .btn-secondary {
            background: rgba(42, 42, 42, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: white;
            border: 1px solid var(--border-color);
        }

        .light-theme .btn-secondary {
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a2e;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #00cc6a);
            color: black;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #cc0000);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.3);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #cc8800);
            color: black;
            box-shadow: 0 4px 15px rgba(255, 170, 0, 0.3);
        }

        .btn-icon {
            padding: 12px;
            width: auto;
            min-height: auto;
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .grid {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .grid-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .stat {
            text-align: center;
            padding: 16px 10px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent), #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.6875rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .navigation {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            padding: 8px 12px;
            z-index: 100;
            flex-shrink: 0;
        }

        .nav-content {
            display: flex;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            gap: 4px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .nav-content::-webkit-scrollbar {
            display: none;
        }

        .nav-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.6875rem;
            transition: all 0.3s ease;
            touch-action: manipulation;
            flex: 0 0 auto;
            border-radius: 12px;
            position: relative;
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(0, 212, 255, 0.1);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 25%;
            width: 50%;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        .nav-icon {
            font-size: 1.25rem;
            margin-bottom: 2px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(42, 42, 42, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-color);
            font-size: 1rem;
            -webkit-appearance: none;
            appearance: none;
            transition: all 0.3s ease;
        }

        .light-theme .form-input {
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a2e;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent);
        }

        textarea.form-input {
            resize: none;
            min-height: 100px;
            font-family: inherit;
        }

        .ticket-item {
            display: flex;
            flex-direction: column;
            padding: 18px;
            background: rgba(42, 42, 42, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #333;
            transition: all 0.3s ease;
            cursor: pointer;
            animation: slideInRight 0.5s ease;
            animation-fill-mode: both;
            position: relative;
            overflow: hidden;
        }

        .light-theme .ticket-item {
            background: rgba(255, 255, 255, 0.9);
        }

        .ticket-item:nth-child(1) { animation-delay: 0.1s; }
        .ticket-item:nth-child(2) { animation-delay: 0.2s; }
        .ticket-item:nth-child(3) { animation-delay: 0.3s; }
        .ticket-item:nth-child(4) { animation-delay: 0.4s; }
        .ticket-item:nth-child(5) { animation-delay: 0.5s; }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .ticket-item:hover {
            transform: translateX(8px);
            border-left-color: var(--accent);
            background: rgba(42, 42, 42, 0.9);
        }

        .ticket-item.completed {
            border-left-color: var(--success);
            background: linear-gradient(90deg, rgba(0, 255, 136, 0.1), rgba(42, 42, 42, 0.8));
        }

        .ticket-item.in-progress {
            border-left-color: var(--warning);
            background: linear-gradient(90deg, rgba(255, 170, 0, 0.1), rgba(42, 42, 42, 0.8));
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .ticket-number {
            font-size: 1.125rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent), #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ticket-status {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .ticket-status.completed {
            background: rgba(0, 255, 136, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .ticket-status.in-progress {
            background: rgba(255, 170, 0, 0.15);
            color: var(--warning);
            border: 1px solid rgba(255, 170, 0, 0.3);
        }

        .ticket-status.pending {
            background: rgba(102, 102, 102, 0.15);
            color: #888;
            border: 1px solid rgba(102, 102, 102, 0.3);
        }

        .ticket-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: var(--progress-bg);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #9b59b6);
            transition: width 0.5s ease;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0.1) 0%,
                rgba(255,255,255,0.3) 50%,
                rgba(255,255,255,0.1) 100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            font-size: 0.75rem;
            color: #888;
            font-weight: 500;
        }

        .question-card {
            background: rgba(42, 42, 42, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }

        .light-theme .question-card {
            background: rgba(255, 255, 255, 0.9);
        }

        .question-card:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 20px var(--accent);
            transform: translateY(-2px);
        }

        .question-card.practical {
            opacity: 0.9;
            background: rgba(26, 26, 26, 0.8);
            border-color: rgba(255, 68, 68, 0.2);
        }

        .light-theme .question-card.practical {
            background: rgba(255, 240, 240, 0.9);
        }

        .question-header {
            padding: 16px 20px;
            background: rgba(51, 51, 51, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .light-theme .question-header {
            background: rgba(0, 0, 0, 0.05);
        }

        .question-header:hover {
            background: rgba(51, 51, 51, 0.7);
        }

        .question-number {
            font-weight: bold;
            background: rgba(0, 212, 255, 0.1);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.875rem;
            border: 1px solid var(--border-color);
        }

        .practical-badge {
            color: var(--danger);
            background: rgba(255, 68, 68, 0.15);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        // =====================================================
        // ПОИСКОВЫЙ ИНДЕКС
        // =====================================================
        function buildSearchIndex() {
            searchIndex.clear();
            allQuestions.forEach(q => {
                const text = (q.text + ' ' + q.answer).toLowerCase();
                const words = text.split(/\W+/);
                words.forEach(word => {
                    if (word.length < 3) return;
                    const base = word.substring(0, 5);
                    if (!searchIndex.has(base)) {
                        searchIndex.set(base, new Set());
                    }
                    searchIndex.get(base).add(q.id);
                    if (!searchIndex.has(word)) {
                        searchIndex.set(word, new Set());
                    }
                    searchIndex.get(word).add(q.id);
                });
                const formulas = q.answer.match(/[A-Z][a-z]?\d*/g);
                if (formulas) {
                    formulas.forEach(f => {
                        if (!searchIndex.has(f)) {
                            searchIndex.set(f, new Set());
                        }
                        searchIndex.get(f).add(q.id);
                    });
                }
            });
        }

        function smartSearch(query) {
            if (!query) return allQuestions;
            
            query = query.toLowerCase();
            const words = query.split(/\W+/).filter(w => w.length >= 2);
            if (words.length === 0) return allQuestions;
            
            const resultsPerWord = words.map(word => {
                if (searchIndex.has(word)) {
                    return searchIndex.get(word);
                }
                const base = word.substring(0, 5);
                if (searchIndex.has(base)) {
                    return searchIndex.get(base);
                }
                const similar = new Set();
                for (let [key, ids] of searchIndex) {
                    if (key.includes(word) || word.includes(key)) {
                        ids.forEach(id => similar.add(id));
                    }
                }
                return similar;
            });
            
            let result = new Set(resultsPerWord[0]);
            for (let i = 1; i < resultsPerWord.length; i++) {
                result = new Set([...result].filter(id => resultsPerWord[i].has(id)));
            }
            
            return allQuestions.filter(q => result.has(q.id));
        }

        // =====================================================
        // СОХРАНЕНИЕ / ЗАГРУЗКА
        // =====================================================
        function saveAllData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ allQuestions, tickets, theoryQuestions, practiceQuestions }));
                localStorage.setItem(PROGRESS_KEY, JSON.stringify(userProgress));
                localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(bookmarks));
                localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
                localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
                localStorage.setItem(STATS_KEY, JSON.stringify(stats));
                localStorage.setItem(QUIZ_RESULTS_KEY, JSON.stringify(stats.quizResults));
                localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
                localStorage.setItem(GAMIFICATION_KEY, JSON.stringify(gamification));
                localStorage.setItem(TAGS_KEY, JSON.stringify(tags));
            } catch (e) { console.error('Ошибка сохранения', e); }
        }

        function loadAllData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.allQuestions && parsed.allQuestions.length === TOTAL_QUESTIONS) {
                        allQuestions = parsed.allQuestions;
                        tickets = parsed.tickets || [];
                        theoryQuestions = parsed.theoryQuestions || [];
                        practiceQuestions = parsed.practiceQuestions || [];
                    } else {
                        initData();
                    }
                } else {
                    initData();
                }

                const prog = localStorage.getItem(PROGRESS_KEY);
                if (prog) {
                    userProgress = JSON.parse(prog);
                    if (!userProgress.lastViewed) userProgress.lastViewed = {};
                    if (!userProgress.recentlyViewed) userProgress.recentlyViewed = [];
                    if (!userProgress.timeSpent) userProgress.timeSpent = {};
                }

                const bm = localStorage.getItem(BOOKMARKS_KEY);
                if (bm) bookmarks = JSON.parse(bm);

                const nt = localStorage.getItem(NOTES_KEY);
                if (nt) notes = JSON.parse(nt);

                const stg = localStorage.getItem(SETTINGS_KEY);
                if (stg) {
                    settings = JSON.parse(stg);
                    applySettings();
                }

                const st = localStorage.getItem(STATS_KEY);
                if (st) stats = JSON.parse(st);

                const qr = localStorage.getItem(QUIZ_RESULTS_KEY);
                if (qr) stats.quizResults = JSON.parse(qr);
                
                const hist = localStorage.getItem(HISTORY_KEY);
                if (hist) history = JSON.parse(hist);
                
                const game = localStorage.getItem(GAMIFICATION_KEY);
                if (game) gamification = JSON.parse(game);
                
                const tgs = localStorage.getItem(TAGS_KEY);
                if (tgs) tags = JSON.parse(tgs);
                
                buildSearchIndex();
                
            } catch (e) {
                console.error('Ошибка загрузки', e);
                initData();
            }
        }

        function applySettings() {
            if (settings.theme === 'light') {
                document.body.classList.remove('neon-theme', 'pastel-theme');
                document.body.classList.add('light-theme');
            } else if (settings.theme === 'neon') {
                document.body.classList.remove('light-theme', 'pastel-theme');
                document.body.classList.add('neon-theme');
            } else if (settings.theme === 'pastel') {
                document.body.classList.remove('light-theme', 'neon-theme');
                document.body.classList.add('pastel-theme');
            } else {
                document.body.classList.remove('light-theme', 'neon-theme', 'pastel-theme');
            }
            
            document.documentElement.style.setProperty('--accent', settings.accentColor);
            document.documentElement.style.setProperty('--base-font-size', settings.fontSize + 'px');
            document.body.style.fontSize = settings.fontSize + 'px';
            
            if (settings.reminders) {
                setupReminder();
            }
        }

        // =====================================================
        // ЗВУКИ И ВИБРАЦИЯ
        // =====================================================
        function playSound(type) {
            if (!settings.sound) return;
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.type = 'sine';
            
            switch(type) {
                case 'correct':
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.2);
                    break;
                case 'wrong':
                    oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
                case 'achievement':
                    oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.4);
                    break;
                case 'levelup':
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            const osc = audioCtx.createOscillator();
                            const gain = audioCtx.createGain();
                            osc.connect(gain);
                            gain.connect(audioCtx.destination);
                            osc.frequency.value = 400 + i * 200;
                            gain.gain.value = 0.1;
                            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                            osc.start();
                            osc.stop(audioCtx.currentTime + 0.1);
                        }, i * 100);
                    }
                    break;
            }
        }

        function vibrate(pattern) {
            if (!settings.vibration) return;
            if (navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }

        // =====================================================
        // СИСТЕМА XP И УРОВНЕЙ
        // =====================================================
        function addXP(amount, reason) {
            gamification.xp += amount;
            
            while (gamification.xp >= gamification.xpToNextLevel) {
                gamification.xp -= gamification.xpToNextLevel;
                gamification.level++;
                gamification.xpToNextLevel = Math.floor(gamification.xpToNextLevel * 1.5);
                
                showLevelUp(gamification.level);
                playSound('levelup');
                vibrate([200, 100, 200]);
                
                for (let i = 0; i < 50; i++) {
                    createConfetti();
                }
            }
            
            showToast(`+${amount} XP (${reason})`, 'success');
            saveAllData();
        }

            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div style="text-align: center;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">⬆️</div>
                    <h2 style="color: var(--accent);">Уровень повышен!</h2>
                    <div style="font-size: 3rem; margin: 20px 0; color: var(--level-color);">${level}</div>
                    <p>Открыты новые возможности!</p>
                    <button class="btn btn-primary" style="margin-top: 20px;" onclick="this.parentElement.parentElement.remove()">✕</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // =====================================================
        // TOAST УВЕДОМЛЕНИЯ
        // =====================================================
        function showToast(text, type = 'info') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = text;
            toast.style.borderColor = type === 'success' ? 'var(--success)' : 'var(--accent)';
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);

        // =====================================================
        // НАПОМИНАНИЯ
        // =====================================================
        function setupReminder() {
            if (reminderTimeout) clearTimeout(reminderTimeout);
            
            const now = new Date();
            const [hours, minutes] = settings.reminderTime.split(':').map(Number);
            
            const reminderTime = new Date();
            reminderTime.setHours(hours, minutes, 0, 0);
            
            if (reminderTime <= now) {
                reminderTime.setDate(reminderTime.getDate() + 1);
            }
            
            const delay = reminderTime - now;
            
            reminderTimeout = setTimeout(() => {
                if (Notification.permission === 'granted') {
                    new Notification('🧪 ChemExam Assistant', {
                        body: 'Пора повторить химию!',
                        icon: '/icon.png',
                        badge: '/badge.png',
                        vibrate: [200, 100, 200]
                    });
                }
                setupReminder();
            }, delay);
        }

        function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission !== 'granted') {
                Notification.requestPermission();
            }
        }

        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // =====================================================
        function showMessage(text, type = 'info') {
            showToast(text, type);
        }

        function toggleBookmark(questionId) {
            const idx = bookmarks.indexOf(questionId);
            if (idx === -1) {
                bookmarks.push(questionId);
                showToast('⭐ Добавлено в избранное', 'success');
                playSound('correct');
                vibrate(50);
                
                if (bookmarks.length >= 20) {
                    checkAchievement('collector');
                }
            } else {
                bookmarks.splice(idx, 1);
                showToast('⭐ Удалено из избранного', 'info');
            }
            saveAllData();
            updateBookmarkIcon(questionId);
        }

            const btn = document.querySelector(`.bookmark-btn[data-id="${questionId}"]`);
            if (btn) {
                const isBookmark = bookmarks.includes(questionId);
                btn.innerHTML = isBookmark ? '⭐' : '☆';

            }

        const debouncedAutoSave = debounce((questionId, text) => {
            if (!settings.autoSave) return;
            text = text.trim();
            if (!text) {
                delete notes[questionId];
            } else {
                notes[questionId] = { text, date: new Date().toISOString() };
                
                if (Object.keys(notes).length >= 10) {
                    checkAchievement('writer');
                }
            }
            saveAllData();
            showToast('📝 Автосохранение', 'info');
        }, 2000);

        function handleNoteInput(questionId, text) {
            debouncedAutoSave(questionId, text);
        }

        function saveNote(questionId, text) {
            text = text.trim();
            if (text.length > 2000) {
                showToast('Заметка слишком длинная (макс. 2000 символов)', 'info');
                return;
            }
            if (!text) {
                deleteNote(questionId);
                return;
            }
            notes[questionId] = { text, date: new Date().toISOString() };
            saveAllData();
            showToast('📝 Заметка сохранена', 'success');
        }

        function deleteNote(questionId) {
            if (notes[questionId]) {
                delete notes[questionId];
                saveAllData();
                showToast('📝 Заметка удалена', 'info');
                rerenderCurrentPage();
            }

            if (openedAnswers.has(questionId)) {
                openedAnswers.delete(questionId);
            } else {
                openedAnswers.add(questionId);
            }
            const answerDiv = document.getElementById(`answer-${questionId}`);

                answerDiv.classList.toggle('hidden');

            }
        }

        function addToHistory(questionId) {
            const q = allQuestions.find(q => q.id === questionId);
            if (!q) return;
            
            history = history.filter(item => item.id !== questionId);
            history.unshift({
                id: questionId,
                number: q.number,
                type: q.type,
                date: new Date().toISOString()
            });
            
            if (history.length > 20) history.pop();
            
            saveAllData();
        }

        function updateProgress(questionId, type) {
            const today = new Date().toISOString().split('T')[0];
            const now = Date.now();
            const hour = new Date().getHours();
            
            if (!userProgress.questions) userProgress.questions = {};
            userProgress.questions[questionId] = true;
            userProgress.lastViewed[questionId] = new Date().toISOString();
            
            const lastView = userProgress.lastViewed[questionId];
            if (lastView) {
                const timeSpent = Math.round((now - new Date(lastView).getTime()) / 1000);
                if (timeSpent > 0 && timeSpent < 3600) {
                    if (!userProgress.timeSpent) userProgress.timeSpent = {};
                    userProgress.timeSpent[questionId] = (userProgress.timeSpent[questionId] || 0) + timeSpent;
                    
                    if (timeSpent < 10) {
                        checkAchievement('speedster');
                    }
                }
            }

            const recent = userProgress.recentlyViewed || [];
            const existingIndex = recent.findIndex(item => item.id === questionId);
            if (existingIndex !== -1) recent.splice(existingIndex, 1);
            recent.unshift({ id: questionId, date: new Date().toISOString() });
            if (recent.length > 20) recent.pop();
            userProgress.recentlyViewed = recent;
            
            addToHistory(questionId);

            const last = userProgress.lastActive;
            const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
            if (last === yesterday) {
                userProgress.streak = (userProgress.streak || 0) + 1;
                
                if (userProgress.streak > stats.bestStreak) {
                    stats.bestStreak = userProgress.streak;
                }
                
                if (userProgress.lastActive === yesterday) {
                    gamification.combo++;
                    gamification.lastComboDate = today;
                    
                    if (gamification.combo > 1) {
                        showToast(`Комбо x${gamification.combo}! +${gamification.combo * 10} XP`, 'success');
                        addXP(gamification.combo * 10, 'combo');
                    }
                }
            } else if (last !== today) {
                userProgress.streak = 1;
                gamification.combo = 1;
                gamification.lastComboDate = today;
            }
            userProgress.lastActive = today;

            userProgress.studyTime = (userProgress.studyTime || 0) + 5;
            stats.totalStudyTime = (stats.totalStudyTime || 0) + 5;
            
            const currentSession = 5;
            if (currentSession > stats.longestSession) {
                stats.longestSession = currentSession;
            }

            if (!stats.dailyActivity) stats.dailyActivity = {};
            if (!stats.dailyActivity[today]) stats.dailyActivity[today] = 0;
            stats.dailyActivity[today]++;
            
            if (stats.dailyActivity[today] >= 10) {
                checkAchievement('marathon');
            }
            
            stats.hourlyActivity[hour] = (stats.hourlyActivity[hour] || 0) + 1;
            
            if (hour >= 0 && hour < 4) {
                checkAchievement('nightOwl');
            }
            
            if (hour >= 4 && hour < 6) {
                checkAchievement('earlyBird');
            }

            addXP(10, 'изучение вопроса');

            checkAchievements();
            checkDailyChallenges();
            checkWeeklyChallenges();
            checkChests();
            saveAllData();
            updateGlobalProgress();
        }

        function updateGlobalProgress() {
            const total = allQuestions.length;
            const studied = Object.values(userProgress.questions || {}).filter(v => v).length;
            const percent = total ? (studied / total) * 100 : 0;
            const bar = document.getElementById('global-progress-fill');
            if (bar) bar.style.width = percent + '%';
        }

        function checkAchievement(achievementId) {
            const achievement = achievements.find(a => a.id === achievementId);
            if (!achievement) return false;
            
            if (!gamification.achievements[achievementId]) {
                gamification.achievements[achievementId] = {
                    date: new Date().toISOString()
                };
                
                addXP(achievement.xp, 'достижение');
                playSound('achievement');
                vibrate([100, 50, 100]);
                
                showToast(`🏆 Достижение: ${achievement.title}`, 'success');
                
                for (let i = 0; i < 30; i++) {
                    createConfetti();
                }
                
                return true;
            }
            return false;
        }

        function checkAchievements() {
            const totalStudied = Object.values(userProgress.questions || {}).filter(v => v).length;
            const practiceStudied = allQuestions.filter(q => q.type === 'practice' && userProgress.questions?.[q.id]).length;
            const totalQuizCorrect = (stats.quizResults || []).reduce((s, r) => s + r.score, 0);
            const totalBookmarks = bookmarks.length;
            const totalNotes = Object.keys(notes).length;

            achievements.forEach(a => {
                if (!gamification.achievements[a.id]) {
                    let achieved = false;
                    if (a.id === 'novice') achieved = totalStudied >= 5;
                    else if (a.id === 'expert') achieved = totalStudied >= 15;
                    else if (a.id === 'master') achieved = totalStudied >= 30;
                    else if (a.id === 'practice') achieved = practiceStudied >= 1;
                    else if (a.id === 'streak7') achieved = (userProgress.streak || 0) >= 7;
                    else if (a.id === 'streak30') achieved = (userProgress.streak || 0) >= 30;
                    else if (a.id === 'quizMaster') achieved = totalQuizCorrect >= 50;
                    else if (a.id === 'collector') achieved = totalBookmarks >= 20;
                    else if (a.id === 'writer') achieved = totalNotes >= 10;
                    else if (a.id === 'perfectionist') achieved = checkPerfectionist();
                    else if (a.id === 'nightOwl') achieved = false;
                    else if (a.id === 'earlyBird') achieved = false;
                    else if (a.id === 'marathon') achieved = false;
                    else if (a.id === 'speedster') achieved = false;

                    if (achieved) {
                        gamification.achievements[a.id] = { date: new Date().toISOString() };
                        addXP(a.xp, 'достижение');
                        playSound('achievement');
                        showMessage(`🏆 Достижение: ${a.title}`, 'success');
                    }
                }
            });
        }

        function checkPerfectionist() {
            const lastQuiz = stats.quizResults?.[stats.quizResults.length - 1];
            return lastQuiz && lastQuiz.percentage === 100;
        }

        function checkDailyChallenges() {
            const today = new Date().toISOString().split('T')[0];
            
            dailyChallenges.forEach(challenge => {
                if (!gamification.dailyChallenges[today]) {
                    gamification.dailyChallenges[today] = {};
                }
                
                let progress = 0;
                if (challenge.id === 'daily1') {
                    progress = Object.values(userProgress.questions || {}).filter(v => v).length;
                } else if (challenge.id === 'daily2') {
                    progress = stats.quizResults?.filter(r => r.date.startsWith(today)).length || 0;
                } else if (challenge.id === 'daily3') {
                    progress = bookmarks.length;
                } else if (challenge.id === 'daily4') {
                    progress = Object.keys(notes).length;
                } else if (challenge.id === 'daily5') {
                    progress = userProgress.recentlyViewed?.length || 0;
                }
                
                if (progress >= challenge.target && !gamification.dailyChallenges[today][challenge.id]) {
                    gamification.dailyChallenges[today][challenge.id] = true;
                    addXP(challenge.xp, 'ежедневное задание');
                    showToast(`✅ Задание выполнено: ${challenge.title}`, 'success');
                }
            });
        }

        function checkWeeklyChallenges() {
            const week = getWeekNumber(new Date());
            
            weeklyChallenges.forEach(challenge => {
                if (!gamification.weeklyChallenges) {
                    gamification.weeklyChallenges = {};
                }
                if (!gamification.weeklyChallenges[week]) {
                    gamification.weeklyChallenges[week] = {};
                }
                
                let progress = 0;
                if (challenge.id === 'weekly1') {
                    progress = Object.values(userProgress.questions || {}).filter(v => v).length;
                } else if (challenge.id === 'weekly2') {
                    progress = stats.quizResults?.length || 0;
                } else if (challenge.id === 'weekly3') {
                    progress = userProgress.streak || 0;
                } else if (challenge.id === 'weekly4') {
                    progress = gamification.xp;
                }
                
                if (progress >= challenge.target && !gamification.weeklyChallenges[week][challenge.id]) {
                    gamification.weeklyChallenges[week][challenge.id] = true;
                    addXP(challenge.xp, 'еженедельный челлендж');
                    showToast(`🏆 Челлендж выполнен: ${challenge.title}`, 'success');
                }
            });
        }

        function getWeekNumber(date) {
            const firstDayOfYear = new Date(date.getFullYear(), 0, 1);
            const pastDaysOfYear = (date - firstDayOfYear) / 86400000;
            return Math.ceil((pastDaysOfYear + firstDayOfYear.getDay() + 1) / 7);
        }

        function checkChests() {
            const streak = userProgress.streak || 0;
            
            chests.forEach(chest => {
                if (streak >= chest.days && !gamification.chests?.includes(chest.id)) {
                    if (!gamification.chests) gamification.chests = [];
                    gamification.chests.push(chest.id);
                    
                    addXP(chest.xp, 'сундук');
                    
                    const modal = document.createElement('div');
                    modal.className = 'modal';
                    modal.innerHTML = `
                        <div style="text-align: center;">
                            <div style="font-size: 4rem; margin-bottom: 20px;">🎁</div>
                            <h2 style="color: var(--accent);">Сундук открыт!</h2>
                            <p style="margin: 20px 0;">Вы получили ${chest.xp} XP</p>
                            <button class="btn btn-primary" onclick="this.parentElement.parentElement.remove()">✕</button>
                        </div>
                    `;
                    document.body.appendChild(modal);
                    
                    for (let i = 0; i < 20; i++) {
                        createConfetti();
                    }
                }
            });
        }

        function addTag(questionId, tag) {
            if (!tags[questionId]) tags[questionId] = [];
            if (!tags[questionId].includes(tag)) {
                tags[questionId].push(tag);
                saveAllData();
                showToast(`🏷️ Тег "${tag}" добавлен`, 'success');
            }
        }

        function removeTag(questionId, tag) {
            if (tags[questionId]) {
                tags[questionId] = tags[questionId].filter(t => t !== tag);
                saveAllData();
                showToast(`🏷️ Тег удален`, 'info');
            }
        }

        function getQuestionsByTag(tag) {
            const ids = [];
            Object.entries(tags).forEach(([id, tgs]) => {
                if (tgs.includes(tag)) ids.push(parseInt(id));
            });
            return allQuestions.filter(q => ids.includes(q.id));
        }

            allQuestions.sort((a,b)=>a.number-b.number).forEach(q => {

        function importProgress(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.userProgress && data.bookmarks && data.notes && data.stats) {
                        userProgress = data.userProgress;
                        bookmarks = data.bookmarks;
                        notes = data.notes;
                        stats = data.stats;
                        history = data.history || [];
                        gamification = data.gamification || gamification;
                        tags = data.tags || {};
                        saveAllData();
                        buildSearchIndex();
                        showToast('📥 Прогресс импортирован', 'success');
                        rerenderCurrentPage();
                    } else {
                        showToast('Неверный формат файла', 'danger');
                    }
                } catch (ex) {
                    showToast('Ошибка чтения файла', 'danger');
                }
            };
            reader.readAsText(file);
        }

        function highlightTerms(text) {
            if (!text) return text;
            
            let result = text;
            Object.keys(termDefinitions).forEach(term => {
                const regex = new RegExp(`\\b${term}\\b`, 'gi');
                result = result.replace(regex, match => 
                    `<span class="key-term" title="${termDefinitions[term.toLowerCase()]}">${match}</span>`
                );
            });
            
            return result;
        }

        function generateActivityCalendar() {
            const days = [];
            const today = new Date();
            
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];

        function generateHeatmap() {
            const cells = [];
            const today = new Date();
            
            for (let i = 89; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                const count = stats.dailyActivity?.[dateStr] || 0;
                const level = Math.min(9, count);
                
                cells.push(`
                    <div class="heatmap-cell" data-level="${level}" title="${dateStr}: ${count} действий"></div>
                `);
            }
            
            return cells.join('');
        }

        // =====================================================
        // СТРАНИЦА ТЕОРИИ
        // =====================================================
        function showTheoryPage(filter = 'all', search = '', sort = 'number') {
            currentPageState = { name: 'theory', params: { filter, search, sort } };
            loadAllData();

            let filtered = [...theoryQuestions];
            
            if (filter === 'completed') filtered = filtered.filter(q => userProgress.questions?.[q.id]);
            else if (filter === 'incomplete') filtered = filtered.filter(q => !userProgress.questions?.[q.id]);
            else if (filter === 'bookmarked') filtered = filtered.filter(q => bookmarks.includes(q.id));
            else if (filter === 'has-notes') filtered = filtered.filter(q => notes[q.id]);
            
            if (search) {
                filtered = smartSearch(search).filter(q => q.type === 'theory');
            }
            
            if (sort === 'number') {
                filtered.sort((a, b) => a.number - b.number);
            } else if (sort === 'date') {
                filtered.sort((a, b) => {

        function highlightSearch(text, search) {
            if (!search) return text;
            const regex = new RegExp(`(${search.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        // =====================================================

        // =====================================================
        // ДЕТАЛЬНЫЙ ПРОСМОТР ВОПРОСА
        // =====================================================
        function showQuestionDetail(questionId) {
            currentPageState = { name: 'detail', params: { questionId } };
            loadAllData();
            const q = allQuestions.find(q => q.id === questionId);
            if (!q) {
                showTheoryPage();
                return;
            }

            addToHistory(questionId);
            
            if (!userProgress.lastViewed) userProgress.lastViewed = {};
            userProgress.lastViewed[questionId] = new Date().toISOString();

            const done = userProgress.questions?.[q.id] || false;
            const book = bookmarks.includes(q.id);
            const note = notes[q.id];
            const answerOpen = openedAnswers.has(q.id);
            const ticketInfo = getTicketInfoByQuestionId(q.id);
            const backPage = q.type === 'theory' ? 'showTheoryPage' : 'showPracticePage';
            const timeSpent = userProgress.timeSpent?.[q.id] || 0;
            const questionTags = tags[q.id] || [];

            const sameTypeQuestions = q.type === 'theory' ? theoryQuestions : practiceQuestions;
            const currentIndex = sameTypeQuestions.findIndex(item => item.id === q.id);
            const prevQuestion = currentIndex > 0 ? sameTypeQuestions[currentIndex - 1] : null;
            const nextQuestion = currentIndex < sameTypeQuestions.length - 1 ? sameTypeQuestions[currentIndex + 1] : null;

            const app = document.getElementById('app');
            app.innerHTML = `
                <header class="header">
                    <div class="header-content">
                        <div class="logo-text">Вопрос №${q.number}</div>
                        <button onclick="${backPage}()" class="back-btn">← Назад</button>
                    </div>
                </header>
                <main class="main-content scroll-container">
                    <div class="question-card">
                        <div class="question-header" onclick="toggleQuestionAnswer(${q.id})">
                            <span class="question-number">${q.type==='theory'?'📚 Теория':'⚗️ Практика'}</span>
                            <div>
                                <span style="margin-right: 10px; color: #888;">⏱️ ${Math.floor(timeSpent/60)}м</span>
                                <button class="bookmark-btn ${book?'active':''}" data-id="${q.id}" onclick="event.stopPropagation(); toggleBookmark(${q.id})">${book?'⭐':'☆'}</button>
                            </div>
                        </div>
                        <div class="question-text">${q.text}</div>
                        <div class="answer-container">
                            <div class="answer-content ${answerOpen ? '' : 'hidden'}" id="answer-${q.id}">${highlightTerms(q.answer)}</div>
                            <div style="display:flex; gap:8px; margin-top:12px">
                                <button class="btn btn-secondary" style="flex:1" onclick="toggleQuestionAnswer(${q.id})">${answerOpen ? '🔍 Скрыть ответ' : '🔍 Показать ответ'}</button>
                                <button class="btn btn-secondary" style="flex:1" onclick="showNoteInput(${q.id})">📝 Заметка</button>
                            </div>
                            <div id="note-${q.id}" class="hidden" style="margin-top:12px">
                                <textarea class="note-input" id="noteText-${q.id}" rows="3" placeholder="Ваша заметка... (макс. 2000 символов)" maxlength="2000" oninput="handleNoteInput(${q.id}, this.value)">${note?.text||''}</textarea>
                                <div class="note-actions">
                                    <button class="btn btn-success" style="flex:1" onclick="saveNote(${q.id}, document.getElementById('noteText-${q.id}').value)">💾 Сохранить</button>
                                    ${note ? `<button class="btn btn-danger" style="flex:1" onclick="deleteNote(${q.id})">🗑️ Удалить</button>` : ''}
                                </div>
                            </div>
                            ${note ? `
                            <div style="margin-top:12px;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px">
                                <small>📝 ${new Date(note.date).toLocaleDateString()}</small>
                                <p>${note.text}</p>
                            </div>` : ''}
                            
                            ${questionTags.length > 0 ? `
                            <div style="margin-top:12px">
                                ${questionTags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                            </div>
                            ` : ''}
                            
                            <div style="margin-top:12px">
                                <input type="text" class="form-input" placeholder="Добавить тег..." id="tag-${q.id}" style="padding: 8px;">
                                <button class="btn btn-secondary" style="margin-top:5px;" onclick="addTag(${q.id}, document.getElementById('tag-${q.id}').value); document.getElementById('tag-${q.id}').value=''">➕ Добавить тег</button>
                            </div>
                            
                            ${!done ? `<button class="btn btn-success" style="margin-top:12px" onclick="markQuestionLearnedSingle(${q.id})">✓ Отметить изученным</button>` : ''}
                            ${ticketInfo ? `<button class="btn btn-secondary" style="margin-top:12px" onclick="showTicket(${ticketInfo.number})">🎫 Перейти к билету №${ticketInfo.number}</button>` : ''}
                        </div>
                    </div>
                    
                    <div class="grid grid-2" style="margin-top: 16px;">
                        ${prevQuestion ? `<button class="btn btn-secondary" onclick="showQuestionDetail(${prevQuestion.id})">← Вопрос ${prevQuestion.number}</button>` : '<div></div>'}
                        ${nextQuestion ? `<button class="btn btn-primary" onclick="showQuestionDetail(${nextQuestion.id})">Вопрос ${nextQuestion.number} →</button>` : '<div></div>'}
                    </div>
                    
                    <button class="btn btn-secondary" onclick="showRandomQuestion()" style="margin-top: 8px;">🎲 Случайный вопрос</button>
                </main>
                ${renderNavigation(q.type==='теория'?'Теория':'Практика')}
            `;
        }

        function markQuestionLearnedSingle(questionId) {
            const q = allQuestions.find(q => q.id === questionId);
            if (q) {
                updateProgress(questionId, q.type);
                showQuestionDetail(questionId);
            }
        }

        // =====================================================

        function showStatsPage() {
            currentPageState = { name: 'stats', params: {} };
            loadAllData();

            const totalQuestions = allQuestions.length;
            const studied = Object.values(userProgress.questions || {}).filter(v=>v).length;
            const percent = totalQuestions ? Math.round((studied/totalQuestions)*100) : 0;

            const theoryCount = theoryQuestions.length;
            const practiceCount = practiceQuestions.length;
            const theoryStudied = theoryQuestions.filter(q => userProgress.questions?.[q.id]).length;
            const practiceStudied = practiceQuestions.filter(q => userProgress.questions?.[q.id]).length;

            const last7Days = [];
            for (let i=6; i>=0; i--) {
                const d = new Date(); d.setDate(d.getDate()-i);
                const ds = d.toISOString().split('T')[0];
                last7Days.push({ date: ds, day: d.toLocaleDateString('ru-RU',{weekday:'short'}), count: stats.dailyActivity?.[ds] || 0 });
            }
            const maxAct = Math.max(...last7Days.map(d=>d.count),1);

            const quizResults = stats.quizResults || [];
            const totalQuizTaken = quizResults.length;
            const totalQuizQuestions = quizResults.reduce((s,r) => s + r.total, 0);
            const totalQuizCorrect = quizResults.reduce((s,r) => s + r.score, 0);
            const avgPercent = totalQuizQuestions ? Math.round((totalQuizCorrect / totalQuizQuestions) * 100) : 0;

            const totalTime = userProgress.studyTime || 0;
            const avgTimePerQuestion = studied ? Math.floor(totalTime / studied) : 0;

            const mostViewed = Object.entries(userProgress.lastViewed || {})
                .map(([id, date]) => ({ id: parseInt(id), date }))
                .sort((a, b) => new Date(b.date) - new Date(a.date))

                            <div class="stat"><div class="stat-value">${totalQuestions-studied}</div><div class="stat-label">Осталось</div></div>
                            <div class="stat"><div class="stat-value">${percent}%</div><div class="stat-label">Прогресс</div></div>
                        </div>
                        <div class="progress-bar" style="margin:16px 0"><div class="progress-fill" style="width:${percent}%"></div></div>
                        <div class="grid-2">
                            <div class="stat"><div class="stat-value">${theoryStudied}/${theoryCount}</div><div class="stat-label">Теория</div></div>
                            <div class="stat"><div class="stat-value">${practiceStudied}/${practiceCount}</div><div class="stat-label">Практика</div></div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <h3>Активность за неделю</h3>
                        <div style="display:flex;justify-content:space-around;align-items:flex-end;height:100px;margin-top:20px">
                            ${last7Days.map(d => `
                                <div style="display:flex;flex-direction:column;align-items:center;width:40px">
                                    <div style="height:${(d.count/maxAct)*60}px;width:20px;background:linear-gradient(135deg,var(--accent),#9b59b6);border-radius:10px 10px 0 0"></div>
                                    <div style="margin-top:8px;font-size:0.6875rem;color:#888">${d.day}</div>
                                    <div style="font-size:0.625rem;color:var(--accent)">${d.count}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="card">
                        <h3>Время занятий</h3>
                        <div class="stats-grid">
                            <div class="stat"><div class="stat-value">${Math.floor(totalTime/60)}ч ${totalTime%60}м</div><div class="stat-label">Всего</div></div>
                            <div class="stat"><div class="stat-value">${avgTimePerQuestion}м</div><div class="stat-label">На вопрос</div></div>
                            <div class="stat"><div class="stat-value">${userProgress.streak || 0}</div><div class="stat-label">Дней подряд</div></div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <h3>Статистика тестов</h3>
                        <div class="stats-grid">
                            <div class="stat"><div class="stat-value">${totalQuizTaken}</div><div class="stat-label">Тестов</div></div>
                            <div class="stat"><div class="stat-value">${avgPercent}%</div><div class="stat-label">Средний</div></div>
                            <div class="stat"><div class="stat-value">${totalQuizCorrect}</div><div class="stat-label">Правильных</div></div>
                        </div>
                        ${quizResults.length > 0 ? `
