<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChemExam Assistant</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ===== БАЗОВЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-gradient-start: #0a0a0a;
            --bg-gradient-end: #1a1a2e;
            --text-color: white;
            --text-secondary: #b0b0b0;
            --card-bg: rgba(26, 26, 26, 0.6);
            --header-bg: rgba(26, 26, 26, 0.8);
            --border-color: rgba(0, 212, 255, 0.1);
            --progress-bg: rgba(51, 51, 51, 0.5);
            --base-font-size: 16px;
            --success: #00ff88;
            --danger: #ff4444;
            --warning: #ffaa00;
            --info: #00d4ff;
        }

        body.light-theme {
            --bg-gradient-start: #f5f7fa;
            --bg-gradient-end: #e6e9f0;
            --text-color: #1a1a2e;
            --text-secondary: #4a4a6a;
            --card-bg: rgba(255, 255, 255, 0.8);
            --header-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 212, 255, 0.3);
            --progress-bg: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-color);
            overflow-x: hidden;
            height: 100vh;
            height: -webkit-fill-available;
            position: relative;
            transition: background 0.3s ease;
            font-size: var(--base-font-size);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.03) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(155, 89, 182, 0.03) 0%, transparent 30%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 10px);
            pointer-events: none;
            z-index: 0;
        }

        #app {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-color);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 212, 255, 0.1);
            border-top: 3px solid var(--info);
            border-right: 3px solid #9b59b6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .logo-text {
            font-size: 1.125rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--info), #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--info);
            cursor: pointer;
            font-size: 0.875rem;
            padding: 4px 8px;
        }

        .global-progress {
            height: 3px;
            background: rgba(255,255,255,0.1);
            width: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
        }
        .global-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--info), #9b59b6);
            transition: width 0.3s;
        }

        .main-content {
            padding: 16px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 70px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, border-color 0.3s ease;
            animation: fadeInUp 0.5s ease;
        }

        .card:hover {
            border-color: rgba(0, 212, 255, 0.3);
            transform: translateY(-2px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            background: linear-gradient(135deg, var(--info), #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        h2 {
            color: var(--text-color);
            font-size: 1.25rem;
            margin-bottom: 12px;
            font-weight: 600;
            position: relative;
            display: inline-block;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--info), transparent);
            border-radius: 2px;
        }

        h3 {
            color: var(--text-color);
            font-size: 1rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
            font-size: 0.875rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 20px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.9375rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            width: 100%;
            touch-action: manipulation;
            min-height: 48px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--info), #0099cc);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(42, 42, 42, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: white;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .light-theme .btn-secondary {
            background: rgba(255, 255, 255, 0.8);
            color: #1a1a2e;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #00cc6a);
            color: black;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #cc0000);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.3);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #cc8800);
            color: black;
            box-shadow: 0 4px 15px rgba(255, 170, 0, 0.3);
        }

        .btn-icon {
            padding: 12px;
            width: auto;
            min-height: auto;
        }

        .grid {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .stat {
            text-align: center;
            padding: 16px 10px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(0, 212, 255, 0.1);
            transition: all 0.3s ease;
        }

        .stat:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--info), #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.6875rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .navigation {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 212, 255, 0.2);
            padding: 8px 12px;
            z-index: 100;
            flex-shrink: 0;
        }

        .nav-content {
            display: flex;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            gap: 4px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }

        .nav-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.6875rem;
            transition: all 0.3s ease;
            touch-action: manipulation;
            flex: 0 0 auto;
            border-radius: 12px;
        }

        .nav-item.active {
            color: var(--info);
            background: rgba(0, 212, 255, 0.1);
        }

        .nav-icon {
            font-size: 1.25rem;
            margin-bottom: 2px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(42, 42, 42, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            -webkit-appearance: none;
            appearance: none;
            transition: all 0.3s ease;
        }

        .light-theme .form-input {
            background: rgba(255, 255, 255, 0.8);
            color: #1a1a2e;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--info);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        textarea.form-input {
            resize: none;
            min-height: 100px;
            font-family: inherit;
        }

        .ticket-item {
            display: flex;
            flex-direction: column;
            padding: 18px;
            background: rgba(42, 42, 42, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #333;
            transition: all 0.3s ease;
            cursor: pointer;
            animation: slideInRight 0.5s ease;
            animation-fill-mode: both;
        }

        .light-theme .ticket-item {
            background: rgba(255, 255, 255, 0.8);
        }

        .ticket-item:nth-child(1) { animation-delay: 0.1s; }
        .ticket-item:nth-child(2) { animation-delay: 0.2s; }
        .ticket-item:nth-child(3) { animation-delay: 0.3s; }
        .ticket-item:nth-child(4) { animation-delay: 0.4s; }
        .ticket-item:nth-child(5) { animation-delay: 0.5s; }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .ticket-item:hover {
            transform: translateX(5px);
            border-left-color: var(--info);
            background: rgba(42, 42, 42, 0.8);
        }

        .ticket-item.completed {
            border-left-color: var(--success);
            background: linear-gradient(90deg, rgba(0, 255, 136, 0.1), rgba(42, 42, 42, 0.6));
        }

        .ticket-item.in-progress {
            border-left-color: var(--warning);
            background: linear-gradient(90deg, rgba(255, 170, 0, 0.1), rgba(42, 42, 42, 0.6));
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .ticket-number {
            font-size: 1.125rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--info), #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ticket-status {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .ticket-status.completed {
            background: rgba(0, 255, 136, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .ticket-status.in-progress {
            background: rgba(255, 170, 0, 0.15);
            color: var(--warning);
            border: 1px solid rgba(255, 170, 0, 0.3);
        }

        .ticket-status.pending {
            background: rgba(102, 102, 102, 0.15);
            color: #888;
            border: 1px solid rgba(102, 102, 102, 0.3);
        }

        .ticket-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 3px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--info), #9b59b6);
            transition: width 0.5s ease;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0.1) 0%,
                rgba(255,255,255,0.2) 50%,
                rgba(255,255,255,0.1) 100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            font-size: 0.75rem;
            color: #888;
            font-weight: 500;
        }

        .question-card {
            background: rgba(42, 42, 42, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.1);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }

        .light-theme .question-card {
            background: rgba(255, 255, 255, 0.8);
        }

        .question-card:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.1);
        }

        .question-card.practical {
            opacity: 0.7;
            background: rgba(26, 26, 26, 0.6);
            border-color: rgba(255, 68, 68, 0.2);
        }

        .light-theme .question-card.practical {
            background: rgba(255, 240, 240, 0.8);
        }

        .question-header {
            padding: 16px 20px;
            background: rgba(51, 51, 51, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .light-theme .question-header {
            background: rgba(0, 0, 0, 0.05);
        }

        .question-header:hover {
            background: rgba(51, 51, 51, 0.6);
        }

        .question-number {
            font-weight: bold;
            background: rgba(0, 212, 255, 0.1);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.875rem;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .practical-badge {
            color: var(--danger);
            background: rgba(255, 68, 68, 0.15);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .question-text {
            padding: 20px;
            font-size: 0.9375rem;
            line-height: 1.6;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            color: #e0e0e0;
        }

        .light-theme .question-text {
            color: #1a1a2e;
        }

        .answer-container {
            padding: 0 20px 20px 20px;
        }

        .answer-content {
            background: rgba(26, 26, 26, 0.8);
            padding: 20px;
            border-radius: 12px;
            border-left: 3px solid var(--info);
            font-size: 0.875rem;
            line-height: 1.6;
            color: #d0d0d0;
            margin-top: 16px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .light-theme .answer-content {
            background: rgba(240, 240, 255, 0.8);
            color: #1a1a2e;
        }

        .quiz-option {
            background: rgba(42, 42, 42, 0.8);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .light-theme .quiz-option {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(0, 212, 255, 0.3);
        }

        .quiz-option:hover {
            border-color: var(--info);
            transform: translateX(5px);
        }

        .quiz-option.selected {
            border-color: var(--info);
            background: rgba(0, 212, 255, 0.1);
        }

        .quiz-option.correct {
            border-color: var(--success);
            background: rgba(0, 255, 136, 0.1);
        }

        .quiz-option.wrong {
            border-color: var(--danger);
            background: rgba(255, 68, 68, 0.1);
        }

        .quiz-marker {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid currentColor;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            flex-shrink: 0;
        }

        .quiz-marker.selected {
            background: var(--info);
            border-color: var(--info);
            color: white;
        }

        .formula-block {
            background: rgba(30, 30, 63, 0.8);
            padding: 16px;
            border-radius: 12px;
            margin: 12px 0;
            font-family: 'Courier New', monospace;
            color: var(--warning);
            text-align: center;
            border: 1px solid rgba(255, 170, 0, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .key-term {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            color: var(--info);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            margin: 4px;
            border: 1px dashed rgba(0, 212, 255, 0.3);
            transition: all 0.3s ease;
        }

        .key-term:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        .streak-badge {
            background: linear-gradient(135deg, var(--warning), #ff6600);
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.875rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .bookmark-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
            transition: all 0.3s ease;
        }

        .bookmark-btn.active {
            color: var(--warning);
            transform: scale(1.1);
        }

        .search-container {
            position: relative;
            margin-bottom: 16px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .search-clear {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #888;
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
        }
        .search-input:not(:placeholder-shown) + .search-clear {
            display: block;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(42, 42, 42, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 30px;
            color: white;
            font-size: 1rem;
        }

        .light-theme .search-input {
            background: rgba(255, 255, 255, 0.8);
            color: #1a1a2e;
        }

        // =====================================================
        // СОХРАНЕНИЕ / ЗАГРУЗКА
        // =====================================================
        function saveAllData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ allQuestions, tickets, theoryQuestions, practiceQuestions }));
                localStorage.setItem(PROGRESS_KEY, JSON.stringify(userProgress));
                localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(bookmarks));
                localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
                localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
                localStorage.setItem(STATS_KEY, JSON.stringify(stats));
                localStorage.setItem(QUIZ_RESULTS_KEY, JSON.stringify(stats.quizResults));
            } catch (e) { console.error('Ошибка сохранения', e); }
        }

        function loadAllData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.allQuestions && parsed.allQuestions.length === TOTAL_QUESTIONS) {
                        allQuestions = parsed.allQuestions;
                        tickets = parsed.tickets || [];
                        theoryQuestions = parsed.theoryQuestions || [];
                        practiceQuestions = parsed.practiceQuestions || [];
                    } else {
                        initData();
                    }
                } else {
                    initData();
                }

                const prog = localStorage.getItem(PROGRESS_KEY);
                if (prog) {
                    userProgress = JSON.parse(prog);
                    if (!userProgress.lastViewed) userProgress.lastViewed = {};
                    if (!userProgress.recentlyViewed) userProgress.recentlyViewed = [];
                }

                const bm = localStorage.getItem(BOOKMARKS_KEY);
                if (bm) bookmarks = JSON.parse(bm);

                const nt = localStorage.getItem(NOTES_KEY);
                if (nt) notes = JSON.parse(nt);

                const stg = localStorage.getItem(SETTINGS_KEY);
                if (stg) {
                    settings = JSON.parse(stg);
                    applySettings();
                }

                const st = localStorage.getItem(STATS_KEY);
                if (st) stats = JSON.parse(st);

                const qr = localStorage.getItem(QUIZ_RESULTS_KEY);
                if (qr) stats.quizResults = JSON.parse(qr);
            } catch (e) {
                console.error('Ошибка загрузки', e);
                initData();
            }
        }

        function applySettings() {
            if (settings.theme === 'light') document.body.classList.add('light-theme');
            else document.body.classList.remove('light-theme');
            document.documentElement.style.setProperty('--base-font-size', settings.fontSize + 'px');
            document.body.style.fontSize = settings.fontSize + 'px';
        }

        // =====================================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // =====================================================
        function showMessage(text, type = 'info') {
            const msg = document.createElement('div');
            msg.className = `message message-${type}`;
            msg.textContent = text;
            msg.style.position = 'fixed';
            msg.style.top = '70px';
            msg.style.left = '16px';
            msg.style.right = '16px';
            msg.style.zIndex = '1000';
            msg.style.padding = '14px 20px';
            msg.style.borderRadius = '16px';
            msg.style.textAlign = 'center';
            msg.style.animation = 'slideDown 0.3s ease';
            msg.style.background = type === 'success' ? 'rgba(0, 255, 136, 0.15)' : 'rgba(0, 212, 255, 0.15)';
            msg.style.border = type === 'success' ? '1px solid rgba(0, 255, 136, 0.3)' : '1px solid rgba(0, 212, 255, 0.3)';
            msg.style.color = type === 'success' ? 'var(--success)' : 'var(--info)';
            document.body.appendChild(msg);
            setTimeout(() => {
                msg.style.opacity = '0';
                setTimeout(() => { if (msg.parentNode) msg.remove(); }, 300);
            }, 3000);
        }

        function toggleBookmark(questionId) {
            const idx = bookmarks.indexOf(questionId);
            if (idx === -1) {
                bookmarks.push(questionId);
                showMessage('⭐ Добавлено в избранное', 'success');
            } else {
                bookmarks.splice(idx, 1);
                showMessage('⭐ Удалено из избранного', 'info');
            }
            saveAllData();
            updateBookmarkIcon(questionId);
        }

        function updateBookmarkIcon(questionId) {
            const btn = document.querySelector(`.bookmark-btn[data-id="${questionId}"]`);
            if (btn) {
                const isBookmark = bookmarks.includes(questionId);
                btn.innerHTML = isBookmark ? '⭐' : '☆';
                btn.classList.toggle('active', isBookmark);
            } else {
                rerenderCurrentPage();
            }
        }

        function deleteNote(questionId) {
            if (notes[questionId]) {
                delete notes[questionId];
                saveAllData();
                showMessage('📝 Заметка удалена', 'info');
                rerenderCurrentPage();
            }
        }

        function saveNote(questionId, text) {
            text = text.trim();
            if (text.length > 2000) {
                showMessage('Заметка слишком длинная (макс. 2000 символов)', 'info');
                return;
            }
            if (!text) {
                deleteNote(questionId);
                return;
            }
            notes[questionId] = { text, date: new Date().toISOString() };
            saveAllData();
            showMessage('📝 Заметка сохранена', 'success');
            rerenderCurrentPage();
        }

        function showNoteInput(questionId) {
            const el = document.getElementById(`note-${questionId}`);
            if (el) el.classList.toggle('hidden');
        }

        function toggleQuestionAnswer(questionId) {
            if (openedAnswers.has(questionId)) {
                openedAnswers.delete(questionId);
            } else {
                openedAnswers.add(questionId);
            }
            const answerDiv = document.getElementById(`answer-${questionId}`);
            if (answerDiv) {
                answerDiv.classList.toggle('hidden');
                const btn = answerDiv.parentElement?.querySelector('.btn-secondary');
                if (btn) btn.textContent = openedAnswers.has(questionId) ? '🔍 Скрыть ответ' : '🔍 Показать ответ';
            }
        }

        function updateProgress(questionId, type) {
            const today = new Date().toISOString().split('T')[0];
            if (!userProgress.questions) userProgress.questions = {};
            userProgress.questions[questionId] = true;
            userProgress.lastViewed[questionId] = new Date().toISOString();

            const recent = userProgress.recentlyViewed || [];
            const existingIndex = recent.findIndex(item => item.id === questionId);
            if (existingIndex !== -1) recent.splice(existingIndex, 1);
            recent.unshift({ id: questionId, date: new Date().toISOString() });
            if (recent.length > 10) recent.pop();
            userProgress.recentlyViewed = recent;

            const last = userProgress.lastActive;
            const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
            if (last === yesterday) {
                userProgress.streak = (userProgress.streak || 0) + 1;
            } else if (last !== today) {
                userProgress.streak = 1;
            }
            userProgress.lastActive = today;

            userProgress.studyTime = (userProgress.studyTime || 0) + 5;
            stats.totalStudyTime = (stats.totalStudyTime || 0) + 5;

            if (!stats.dailyActivity) stats.dailyActivity = {};
            if (!stats.dailyActivity[today]) stats.dailyActivity[today] = 0;
            stats.dailyActivity[today]++;

            checkAchievements();
            saveAllData();
            updateGlobalProgress();
        }

        function updateGlobalProgress() {
            const total = allQuestions.length;
            const studied = Object.values(userProgress.questions || {}).filter(v => v).length;
            const percent = total ? (studied / total) * 100 : 0;
            const bar = document.getElementById('global-progress-fill');
            if (bar) bar.style.width = percent + '%';
        }

        function checkAchievements() {
            const totalStudied = Object.values(userProgress.questions || {}).filter(v => v).length;
            const practiceStudied = allQuestions.filter(q => q.type === 'practice' && userProgress.questions?.[q.id]).length;
            const totalQuizCorrect = (stats.quizResults || []).reduce((s, r) => s + r.score, 0);

            achievements.forEach(a => {
                if (!userProgress.achievements?.[a.id]) {
                    let achieved = false;
                    if (a.id === 'novice') achieved = totalStudied >= 5;
                    else if (a.id === 'expert') achieved = totalStudied >= 15;
                    else if (a.id === 'master') achieved = totalStudied >= 30;
                    else if (a.id === 'practice') achieved = practiceStudied >= 1;
                    else if (a.id === 'streak7') achieved = (userProgress.streak || 0) >= 7;
                    else if (a.id === 'streak30') achieved = (userProgress.streak || 0) >= 30;
                    else if (a.id === 'quizMaster') achieved = totalQuizCorrect >= 50;

                    if (achieved) {
                        if (!userProgress.achievements) userProgress.achievements = {};
                        userProgress.achievements[a.id] = { date: new Date().toISOString() };
                        showMessage(`🏆 Достижение: ${a.title}`, 'success');
                    }
                }
            });
        }

        function exportToTxt() {
            let content = 'ЭКЗАМЕНАЦИОННЫЕ ВОПРОСЫ ПО ХИМИИ (ПОЛНЫЙ СПИСОК)\n\n';
            allQuestions.sort((a,b)=>a.number-b.number).forEach(q => {
                content += `ВОПРОС №${q.number} (${q.type==='theory'?'теория':'практика'})\n`;
                content += `${q.text}\n\nОТВЕТ:\n${q.answer}\n\n${'='.repeat(50)}\n\n`;
            });
            const blob = new Blob([content], {type:'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'chem_questions.txt';
            a.click();
            URL.revokeObjectURL(url);
            showMessage('📄 Экспорт завершён', 'success');
        }

        function exportProgress() {
            const data = {
                userProgress,
                bookmarks,
                notes,
                stats,
                exportDate: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'chem_progress.json';
            a.click();
            URL.revokeObjectURL(url);
            showMessage('📤 Прогресс экспортирован', 'success');
        }

        function importProgress(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.userProgress && data.bookmarks && data.notes && data.stats) {
                        userProgress = data.userProgress;
                        bookmarks = data.bookmarks;
                        notes = data.notes;
                        stats = data.stats;
                        saveAllData();
                        showMessage('📥 Прогресс импортирован', 'success');
                        rerenderCurrentPage();
                    } else {
                        showMessage('Неверный формат файла', 'danger');
                    }
                } catch (ex) {
                    showMessage('Ошибка чтения файла', 'danger');
                }
            };
            reader.readAsText(file);
        }

        function resetProgress() {
            if (confirm('Сбросить весь прогресс (изученные, заметки, избранное, статистику)?')) {
                userProgress = {
                    questions: {},
                    lastViewed: {},
                    streak: 0,
                    lastActive: null,
                    studyTime: 0,
                    achievements: {},
                    recentlyViewed: []
                };
                bookmarks = [];
                notes = {};
                stats = {
                    dailyActivity: {},
                    totalStudyTime: 0,
                    quizResults: []
                };
                saveAllData();
                showMessage('Прогресс сброшен', 'success');
                rerenderCurrentPage();
            }
        }

        function rerenderCurrentPage() {
            const page = currentPageState.name;
            const params = currentPageState.params;
            switch (page) {
                case 'main': showMainInterface(); break;
                case 'tickets': showTicketsPage(params.filter || 'all'); break;
                case 'ticket': showTicket(params.ticketNumber); break;
                case 'theory': showTheoryPage(params.filter || 'all', params.search || ''); break;
                case 'practice': showPracticePage(params.filter || 'all', params.search || ''); break;
                case 'detail': showQuestionDetail(params.questionId); break;
                case 'stats': showStatsPage(); break;
                case 'settings': showSettingsPage(); break;
                case 'quiz': showQuizPage(); break;
                case 'flashcards': showFlashcardsPage(params.category || 'all', params.mode || 'unlearned'); break;
                case 'reference': showReferencePage(); break;
                case 'examselect': showExamSelectionPage(); break;
                case 'exam': runExam(params.questions, params.title || 'Экзамен'); break;
                default: showMainInterface();
            }
        }

        function getTicketInfoByQuestionId(questionId) {
            for (let t of tickets) {
                if (t.theory.id === questionId || t.practice.id === questionId) return t;
            }
            return null;
        }

        function renderNavigation(activePage) {
            const pages = [
                { name: 'Главная', icon: '🏠', func: 'showMainInterface' },
                { name: 'Билеты', icon: '📋', func: 'showTicketsPage' },
                { name: 'Теория', icon: '📚', func: 'showTheoryPage' },
                { name: 'Практика', icon: '⚗️', func: 'showPracticePage' },
                { name: 'Карточки', icon: '🃏', func: 'showFlashcardsPage' },
                { name: 'Справочник', icon: '📖', func: 'showReferencePage' },
                { name: 'Статистика', icon: '📊', func: 'showStatsPage' },
                { name: 'Настройки', icon: '⚙️', func: 'showSettingsPage' }
            ];
            return `
                <nav class="navigation">
                    <div class="nav-content">
                        ${pages.map(p => `
                            <button class="nav-item ${activePage === p.name ? 'active' : ''}" onclick="${p.func}()">
                                <span class="nav-icon">${p.icon}</span>
                                <span>${p.name}</span>
                            </button>
                        `).join('')}
                    </div>
                </nav>
            `;
        }
        // =====================================================
        // ГЛАВНАЯ СТРАНИЦА
        // =====================================================
        function showMainInterface() {
            currentPageState = { name: 'main', params: {} };
            loadAllData();

            const totalQuestions = allQuestions.length;
            const studied = Object.values(userProgress.questions || {}).filter(v=>v).length;
            const percent = totalQuestions ? Math.round((studied/totalQuestions)*100) : 0;

            const theoryCount = theoryQuestions.length;
            const practiceCount = practiceQuestions.length;
            const theoryStudied = theoryQuestions.filter(q => userProgress.questions?.[q.id]).length;
            const practiceStudied = practiceQuestions.filter(q => userProgress.questions?.[q.id]).length;

            const recent = (userProgress.recentlyViewed || []).slice(0, 5).map(item => allQuestions.find(q => q.id === item.id)).filter(q => q);

            const now = Date.now();
            const threeDaysMs = 3 * 24 * 60 * 60 * 1000;
            const toReview = allQuestions
                .filter(q => {
                    if (userProgress.questions?.[q.id]) return false;
                    const lastView = userProgress.lastViewed?.[q.id];
                    if (!lastView) return true;
                    const lastDate = new Date(lastView).getTime();
                    return (now - lastDate) > threeDaysMs;
                })
                .sort((a, b) => {
                    const lastA = userProgress.lastViewed?.[a.id] ? new Date(userProgress.lastViewed[a.id]).getTime() : 0;
                    const lastB = userProgress.lastViewed?.[b.id] ? new Date(userProgress.lastViewed[b.id]).getTime() : 0;
                    return lastA - lastB;
                })
                .slice(0, 3);

            app.innerHTML = `

                    <div class="header-content">

                    <div class="global-progress">
                        <div id="global-progress-fill" class="global-progress-fill" style="width:${percent}%"></div>

                <main class="main-content scroll-container">
                    <div class="card">
                        <h1>👋 Добро пожаловать!</h1>

                                <span>${studied}/${totalQuestions} вопросов</span>
                                <span>${percent}%</span>
                            </div>
                            <div class="progress-bar" style="height:12px">
                                <div class="progress-fill" style="width:${percent}%"></div>
                            </div>
                        </div>
                        <div class="grid-2">
                            <div class="stat"><div class="stat-value">${theoryStudied}/${theoryCount}</div><div class="stat-label">Теория</div></div>
                            <div class="stat"><div class="stat-value">${practiceStudied}/${practiceCount}</div><div class="stat-label">Практика</div></div>
                        </div>
                    </div>
                    ${recent.length ? `
                    <div class="card">
                        <h3>📌 Недавно просмотренные</h3>
                        <div class="grid-2">
                            ${recent.map(q => `
                                <div class="recent-item" onclick="showQuestionDetail(${q.id})">
                                    <span>${q.type==='theory'?'📚':'⚗️'}</span>
                                    <span>Вопрос ${q.number}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>` : ''}
                    ${toReview.length ? `
                    <div class="card">
                        <h3>🔄 Рекомендуем повторить</h3>
                        <div class="grid-2">
                            ${toReview.map(q => `
                                <div class="recent-item" onclick="showQuestionDetail(${q.id})">
                                    <span>${q.type==='theory'?'📚':'⚗️'}</span>
                                    <span>Вопрос ${q.number}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>` : ''}

                        <h3>🚀 Быстрые действия</h3>

                            <button class="btn btn-primary" onclick="showTicketsPage()">📋 Билеты</button>

                            <button class="btn btn-secondary" onclick="showPracticePage()">⚗️ Практика</button>
                            <button class="btn btn-secondary" onclick="showQuizPage()">🧪 Тест</button>
                            <button class="btn btn-secondary" onclick="showRandomTicket()">🎲 Случайный билет</button>
                            <button class="btn btn-secondary" onclick="showExamSelectionPage()">📝 Экзамен</button>
                        </div>
                    </div>
                </main>
                ${renderNavigation('Главная')}
            `;
        }

        function showRandomTicket() {
            const randomNum = Math.floor(Math.random() * TOTAL_TICKETS) + 1;
            showTicket(randomNum);

        // =====================================================
        // СТРАНИЦА БИЛЕТОВ
        // =====================================================
        function showTicketsPage(filter = 'all') {
            currentPageState = { name: 'tickets', params: { filter } };
            loadAllData();

            let filteredTickets = [...tickets];
            if (filter === 'completed') {
                filteredTickets = filteredTickets.filter(t => 
                    userProgress.questions?.[t.theory.id] && userProgress.questions?.[t.practice.id]
                );
            } else if (filter === 'incomplete') {
                filteredTickets = filteredTickets.filter(t => 
                    !(userProgress.questions?.[t.theory.id] && userProgress.questions?.[t.practice.id])
                );
            } else if (filter === 'bookmarked') {
                filteredTickets = filteredTickets.filter(t => 
                    bookmarks.includes(t.theory.id) || bookmarks.includes(t.practice.id)
                );
            }

            const app = document.getElementById('app');
            app.innerHTML = `
                <header class="header">
                    <div class="header-content">
                        <div class="logo-text">📋 Экзаменационные билеты</div>

                    </div>
                </header>

                    <div class="card">
                        <div class="filter-chips">
                            <span class="filter-chip ${filter==='all'?'active':''}" onclick="showTicketsPage('all')">Все</span>
                            <span class="filter-chip ${filter==='completed'?'active':''}" onclick="showTicketsPage('completed')">✅ Выученные</span>
                            <span class="filter-chip ${filter==='incomplete'?'active':''}" onclick="showTicketsPage('incomplete')">○ Невыученные</span>
                            <span class="filter-chip ${filter==='bookmarked'?'active':''}" onclick="showTicketsPage('bookmarked')">⭐ Избранное</span>

                        <div style="margin-top:16px">

                                const theoryDone = userProgress.questions?.[t.theory.id] || false;
                                const practiceDone = userProgress.questions?.[t.practice.id] || false;
                                const statusClass = (theoryDone && practiceDone) ? 'completed' : (theoryDone || practiceDone) ? 'in-progress' : 'pending';
                                const statusText = (theoryDone && practiceDone) ? '✅ Изучен' : (theoryDone || practiceDone) ? '⏳ В процессе' : '○ Новый';
                                const progressWidth = (theoryDone?50:0) + (practiceDone?50:0);
                                return `
                                    <div class="ticket-item ${statusClass}" onclick="showTicket(${t.number})">

                                        </div>

                                            ⚗️ ${t.practice.text.substring(0,50)}...

                                    </div>

                            }).join('')}

                </main>

            `;

                                    <small>📝 ${new Date(theoryNote.date).toLocaleDateString()}</small>

                        <div class="question-card" id="q-${ticket.practice.id}">
                            <div class="question-header" onclick="toggleQuestionAnswer(${ticket.practice.id})">

                                    <button class="btn btn-secondary" style="flex:1" onclick="showNoteInput(${ticket.practice.id})">📝 Заметка</button>
                                </div>
                                <div id="note-${ticket.practice.id}" class="hidden" style="margin-top:12px">

                                    <div class="note-actions">
                                        <button class="btn btn-success" style="flex:1" onclick="saveNote(${ticket.practice.id}, document.getElementById('noteText-${ticket.practice.id}').value)">💾 Сохранить</button>
                                        ${practiceNote ? `<button class="btn btn-danger" style="flex:1" onclick="deleteNote(${ticket.practice.id})">🗑️ Удалить</button>` : ''}
                                    </div>

                                <div style="margin-top:12px;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px">

        function markQuestionLearned(questionId, ticketNumber) {
            const q = allQuestions.find(q => q.id === questionId);
            if (q) {
                updateProgress(questionId, q.type);
                showTicket(ticketNumber);
            }
        }

        // =====================================================
        // СТРАНИЦА ТЕОРИИ (с поиском)
        // =====================================================
        function showTheoryPage(filter = 'all', search = '') {
            currentPageState = { name: 'theory', params: { filter, search } };
            loadAllData();

            const cacheKey = `${filter}_${search}`;
            if (lastFilterParams.theory === cacheKey && cachedTheoryFiltered) {
                renderTheoryList(cachedTheoryFiltered, filter, search);
                return;
            }

            let filtered = [...theoryQuestions];
            if (filter === 'completed') filtered = filtered.filter(q => userProgress.questions?.[q.id]);
            else if (filter === 'incomplete') filtered = filtered.filter(q => !userProgress.questions?.[q.id]);
            else if (filter === 'bookmarked') filtered = filtered.filter(q => bookmarks.includes(q.id));

            if (search) {
                const s = search.toLowerCase();
                filtered = filtered.filter(q => q.text.toLowerCase().includes(s) || (q.answer && q.answer.toLowerCase().includes(s)));
            }

            cachedTheoryFiltered = filtered;
            lastFilterParams.theory = cacheKey;

            renderTheoryList(filtered, filter, search);
        }

        function renderTheoryList(filtered, filter, search) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <header class="header">
                    <div class="header-content">
                        <div class="logo-text">📚 Теоретические вопросы</div>
                        <button onclick="showMainInterface()" class="back-btn">← Назад</button>
                    </div>
                </header>
                <main class="main-content scroll-container">
                    <div class="card">
                        <div class="search-container">
                            <span class="search-icon">🔍</span>
                            <input type="text" class="search-input" id="theorySearch" placeholder="Поиск по вопросам и ответам" value="${search}" oninput="searchTheory(this.value)">
                            <button class="search-clear" onclick="clearTheorySearch()">✕</button>
                        </div>
                        <div class="filter-chips">
                            <span class="filter-chip ${filter==='all'?'active':''}" onclick="showTheoryPage('all', document.getElementById('theorySearch').value)">Все</span>
                            <span class="filter-chip ${filter==='completed'?'active':''}" onclick="showTheoryPage('completed', document.getElementById('theorySearch').value)">✅ Выученные</span>
                            <span class="filter-chip ${filter==='incomplete'?'active':''}" onclick="showTheoryPage('incomplete', document.getElementById('theorySearch').value)">○ Невыученные</span>
                            <span class="filter-chip ${filter==='bookmarked'?'active':''}" onclick="showTheoryPage('bookmarked', document.getElementById('theorySearch').value)">⭐ Избранное</span>

                            ${filtered.map(q => {

                                return `
                                    <div class="question-card" onclick="showQuestionDetail(${q.id})">
                                        <div class="question-header">
                                            <span class="question-number">Вопрос №${q.number}</span>
                                            <span>${book?'⭐':''} ${done?'✅':''}</span>

                            }).join('')}
                        </div>
                    </div>
                </main>
                ${renderNavigation('Теория')}
            `;
            document.getElementById('theorySearch')?.focus();
        }

        function highlightSearch(text, search) {
            if (!search) return text;
            const regex = new RegExp(`(${search.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function searchTheory(query) {
            showTheoryPage(currentPageState.params.filter, query);
        }

        function clearTheorySearch() {
            showTheoryPage(currentPageState.params.filter, '');
        }

            const app = document.getElementById('app');
            app.innerHTML = `
                <header class="header">

        // =====================================================

        // =====================================================
        function showQuizPage() {
            currentPageState = { name: 'quiz', params: {} };
            loadAllData();

            const shuffled = [...quizQuestions].sort(()=>Math.random()-0.5).slice(0,10);
            let currentIndex = 0;
            let score = 0;
            let selectedOption = null;
            let answerSubmitted = false;
            let timerInterval;
            let timeLeft = 600; // 10 минут

            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            function showQuestion() {
                if (currentIndex >= shuffled.length) {
                    clearInterval(timerInterval);
                    showResults();
                    return;
                }
                const q = shuffled[currentIndex];
                const progress = (currentIndex/shuffled.length)*100;

                const app = document.getElementById('app');
                app.innerHTML = `
                    <header class="header">
                        <div class="header-content">
                            <div class="logo-text">🧪 Тест</div>
                            <button onclick="showMainInterface()" class="back-btn">✕</button>
                        </div>
                    </header>
                    <main class="main-content scroll-container">
                        <div class="quiz-progress">
                            <span class="quiz-score">⭐ ${score}/${currentIndex}</span>
                            <span class="timer ${timeLeft < 60 ? 'warning' : ''}">⏱️ ${formatTime(timeLeft)}</span>
                        </div>
                        <div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:${progress}%"></div></div>
                        <div class="card">
                            <h3>Вопрос ${currentIndex+1}/${shuffled.length}</h3>
                            <p style="font-size:1rem;margin:20px 0">${q.question}</p>
                            <div style="margin-top:20px">
                                ${q.options.map((opt,idx)=>`
                                    <div class="quiz-option ${selectedOption===idx?'selected':''}" onclick="window.selectQuizOption(${idx})">
                                        <span class="quiz-marker ${selectedOption===idx?'selected':''}">${String.fromCharCode(65+idx)}</span>
                                        <span>${opt}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div style="margin-top:20px; display:flex; gap:8px;">
                                ${!answerSubmitted ? 
                                    `<button class="btn btn-primary" style="flex:2" onclick="window.submitQuizAnswer(${q.correct})" ${selectedOption===null?'disabled':''}>✅ Ответить</button>
                                     <button class="btn btn-secondary" style="flex:1" onclick="window.skipQuizQuestion()">⏭️ Пропустить</button>` :
                                    `<button class="btn btn-success" style="flex:1" onclick="window.nextQuizQuestion()">Следующий →</button>`
                                }
                            </div>
                            ${answerSubmitted ? `
                                <div style="margin-top:20px;padding:16px;background:rgba(0,212,255,0.1);border-radius:12px">
                                    <p style="color:${selectedOption===q.correct?'var(--success)':'var(--danger)'}">
                                        ${selectedOption===q.correct ? '✅ Правильно!' : `❌ Неправильно. Правильный ответ: ${q.options[q.correct]}`}
                                    </p>
                                </div>
                            ` : ''}
                        </div>
                    </main>
                `;
                window.selectQuizOption = (idx) => { if(!answerSubmitted) { selectedOption=idx; showQuestion(); } };
                window.submitQuizAnswer = (correctIdx) => {
                    if(selectedOption!==null && !answerSubmitted) {
                        answerSubmitted = true;
                        if(selectedOption===correctIdx) score++;
                        showQuestion();
                    }
                };
                window.skipQuizQuestion = () => {
                    if(!answerSubmitted) {
                        answerSubmitted = true;
                        currentIndex++;
                        selectedOption = null;
                        answerSubmitted = false;
                        showQuestion();
                    }
                };
                window.nextQuizQuestion = () => {
                    currentIndex++;
                    selectedOption = null;
                    answerSubmitted = false;
                    showQuestion();
                };
            }

            function showResults() {
                const percent = Math.round((score/shuffled.length)*100);
                if(!stats.quizResults) stats.quizResults=[];
                stats.quizResults.push({ date: new Date().toISOString(), score, total: shuffled.length, percentage: percent });
                if (stats.quizResults.length > 30) stats.quizResults.shift();
                saveAllData();
                checkAchievements();

                const app = document.getElementById('app');
                app.innerHTML = `
                    <header class="header">
                        <div class="header-content">
                            <div class="logo-text">📊 Результаты</div>
                            <button onclick="showMainInterface()" class="back-btn">✕</button>
                        </div>
                    </header>
                    <main class="main-content scroll-container">
                        <div class="card">
                            <div style="text-align:center">
                                <h1 style="font-size:3rem">${percent}%</h1>
                                <p>Правильных ответов: ${score}/${shuffled.length}</p>
                            </div>
                            <div class="progress-bar" style="height:12px;margin:20px 0"><div class="progress-fill" style="width:${percent}%"></div></div>
                            <div class="grid-2">
                                <button class="btn btn-primary" onclick="showQuizPage()">🔄 Ещё раз</button>
                                <button class="btn btn-secondary" onclick="showMainInterface()">🏠 Главная</button>
                            </div>
                        </div>
                    </main>
                `;
            }

            timerInterval = setInterval(() => {
                timeLeft--;
                if(timeLeft<=0) { 
                    clearInterval(timerInterval); 
                    if (currentIndex < shuffled.length) showResults(); 
                }
                else {
                    const t = document.querySelector('.timer');
                    if(t) {
                        t.textContent = `⏱️ ${formatTime(timeLeft)}`;
                        t.classList.toggle('warning', timeLeft < 60);
                    }
                }
            },1000);

            showQuestion();
        }

        function startFlashcards(category, mode) {
            loadAllData();
            let questions = [];
            if (category === 'all') questions = [...allQuestions];
            else if (category === 'theory') questions = [...theoryQuestions];
            else if (category === 'practice') questions = [...practiceQuestions];

            if (mode === 'unlearned') questions = questions.filter(q => !userProgress.questions?.[q.id]);
            else if (mode === 'bookmarked') questions = questions.filter(q => bookmarks.includes(q.id));

            if (questions.length === 0) {
                showMessage('Нет вопросов для данной категории', 'info');
                showFlashcardsPage(category, mode);
                return;
            }

            questions = questions.sort(() => Math.random() - 0.5);
            runFlashcardsSession(questions);
        }

        function runFlashcardsSession(questions) {
            let remaining = [...questions];
            let currentIndex = 0;
            let flipped = false;
            let startX, currentX, isDragging = false, dragDelta = 0;

            function renderCard() {
                if (remaining.length === 0) {
                    showMessage('🎉 Все карточки пройдены!', 'success');
                    showFlashcardsPage();
                    return;
                }
                const q = remaining[currentIndex];
                const app = document.getElementById('app');
                app.innerHTML = `
                    <header class="header">
                        <div class="header-content">
                            <div class="logo-text">🃏 Карточки (осталось ${remaining.length})</div>
                            <button onclick="showFlashcardsPage()" class="back-btn">✕</button>
                        </div>
                    </header>
                    <main class="main-content scroll-container">
                        <div class="flashcard-container" id="flashcard-container">
                            <div class="flashcard ${flipped ? 'flipped' : ''}" id="flashcard" ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)" ontouchend="handleTouchEnd(event)">
                                <div class="flashcard-front">
                                    <p style="font-size:1.2rem; margin-bottom:10px;">${q.text}</p>
                                    <small style="color:#888;">Нажмите, чтобы перевернуть, или потяните влево/вправо</small>
                                </div>
                                <div class="flashcard-back">
                                    <p>${q.answer}</p>
                                </div>
                            </div>
                        </div>
                        <div class="grid-2" style="margin-top:20px;">
                            <button class="btn btn-danger" onclick="flashcardSwipeLeft()">❌ Не знаю</button>
                            <button class="btn btn-success" onclick="flashcardSwipeRight()">✅ Знаю</button>
                        </div>
                    </main>
                `;
                window.flashcard = document.getElementById('flashcard');
                window.handleTouchStart = (e) => {
                    startX = e.touches[0].clientX;
                    isDragging = true;
                    window.flashcard.classList.add('dragging');
                };
                window.handleTouchMove = (e) => {
                    if (!isDragging) return;
                    currentX = e.touches[0].clientX;
                    dragDelta = currentX - startX;
                    if (dragDelta > 0) {
                        window.flashcard.style.transform = `translateX(${dragDelta}px)`;
                        window.flashcard.classList.add('swipe-right');
                        window.flashcard.classList.remove('swipe-left');
                    } else if (dragDelta < 0) {
                        window.flashcard.style.transform = `translateX(${dragDelta}px)`;
                        window.flashcard.classList.add('swipe-left');
                        window.flashcard.classList.remove('swipe-right');
                    }
                };
                window.handleTouchEnd = () => {
                    if (!isDragging) return;
                    isDragging = false;
                    window.flashcard.classList.remove('dragging');
                    window.flashcard.style.transform = '';
                    if (dragDelta > 50) {
                        flashcardSwipeRight();
                    } else if (dragDelta < -50) {
                        flashcardSwipeLeft();
                    }
                    window.flashcard.classList.remove('swipe-left', 'swipe-right');
                    dragDelta = 0;
                };
                window.flashcardSwipeLeft = () => {
                    // Не знаю – остаётся в колоде, идём дальше
                    currentIndex++;
                    if (currentIndex >= remaining.length) currentIndex = 0;
                    flipped = false;
                    renderCard();
                };
                window.flashcardSwipeRight = () => {
                    // Знаю – удаляем из колоды, отмечаем изученным
                    const qq = remaining[currentIndex];
                    if (qq && !userProgress.questions?.[qq.id]) {
                        updateProgress(qq.id, qq.type);
                    }
                    remaining.splice(currentIndex, 1);
                    if (currentIndex >= remaining.length) currentIndex = 0;
                    flipped = false;
                    renderCard();
                };
                window.flashcard.onclick = () => {
                    flipped = !flipped;
                    window.flashcard.classList.toggle('flipped', flipped);
                };
            }

            renderCard();
        }

        function showReferencePage() {
            currentPageState = { name: 'reference', params: {} };

            // Полная таблица Менделеева (118 элементов)

            // Ряд активности металлов

                let html = '<div class="periodic-table">';

                        if (el) {
                            html += `<div class="periodic-element" title="${el.name}">`;
                            html += `<div class="periodic-element-symbol">${el.symbol}</div>`;
                            html += `<div class="periodic-element-number">${el.number}</div>`;

                html += '</div>';

                // Лантаноиды
                const lanthanides = elements.filter(e => e.number >= 57 && e.number <= 71);
                html += '<h4 style="margin-top:16px;">Лантаноиды</h4><div class="lanthanide-row">';

                    html += `<div class="periodic-element" title="${el.name}"><div class="periodic-element-symbol">${el.symbol}</div><div class="periodic-element-number">${el.number}</div></div>`;

                html += '</div>';

                const actinides = elements.filter(e => e.number >= 89 && e.number <= 103);
                html += '<h4>Актиноиды</h4><div class="actinide-row">';

                    html += `<div class="periodic-element" title="${el.name}"><div class="periodic-element-symbol">${el.symbol}</div><div class="periodic-element-number">${el.number}</div></div>`;

        function getSolubility(cation, anion) {
            // Упрощённая логика для демонстрации. Можно расширить.
            const rules = {
                'Na⁺': { 'Cl⁻':'Р', 'Br⁻':'Р', 'I⁻':'Р', 'S²⁻':'Р', 'OH⁻':'Р', 'SO₄²⁻':'Р', 'CO₃²⁻':'Р', 'PO₄³⁻':'Р' },
                'K⁺': { 'Cl⁻':'Р', 'Br⁻':'Р', 'I⁻':'Р', 'S²⁻':'Р', 'OH⁻':'Р', 'SO₄²⁻':'Р', 'CO₃²⁻':'Р', 'PO₄³⁻':'Р' },
                'NH₄⁺': { 'Cl⁻':'Р', 'Br⁻':'Р', 'I⁻':'Р', 'S²⁻':'Р', 'OH⁻':'Р', 'SO₄²⁻':'Р', 'CO₃²⁻':'Р', 'PO₄³⁻':'Р' },
                'Ag⁺': { 'Cl⁻':'Н', 'Br⁻':'Н', 'I⁻':'Н', 'S²⁻':'Н', 'OH⁻':'?', 'SO₄²⁻':'М', 'CO₃²⁻':'Н', 'PO₄³⁻':'Н' },
                'Ba²⁺': { 'Cl⁻':'Р', 'Br⁻':'Р', 'I⁻':'Р', 'S²⁻':'?', 'OH⁻':'Р', 'SO₄²⁻':'Н', 'CO₃²⁻':'Н', 'PO₄³⁻':'Н' },
                'Ca²⁺': { 'Cl⁻':'Р', 'Br⁻':'Р', 'I⁻':'Р', 'S²⁻':'?', 'OH⁻':'М', 'SO₄²⁻':'М', 'CO₃²⁻':'Н', 'PO₄³⁻':'Н' },
                'Pb²⁺': { 'Cl⁻':'М', 'Br⁻':'М', 'I⁻':'М', 'S²⁻':'Н', 'OH⁻':'Н', 'SO₄²⁻':'Н', 'CO₃²⁻':'Н', 'PO₄³⁻':'Н' },
                // Для остальных по умолчанию '?'
            };
            if (rules[cation] && rules[cation][anion]) return rules[cation][anion];
            return '?';
        }
