<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ChemExam Stable</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #0a0a0a;
            --bg-card: #1a1a2e;
            --bg-secondary: #2a2a3a;
            --accent: #00d4ff;
            --accent-secondary: #9b59b6;
            --text: white;
            --text-secondary: #b0b0b0;
            --success: #00ff88;
            --danger: #ff4444;
            --warning: #ffaa00;
            --info: #00d4ff;
            --nonmetal: #4ecdc4;
            --noble-gas: #ff6b6b;
            --alkali-metal: #ff9f43;
            --alkaline-earth: #feca57;
            --transition: #54a0ff;
            --lanthanide: #5f27cd;
            --actinide: #341f97;
            --metalloid: #00d2d3;
            --post-transition: #48dbfb;
            --chart-bg: rgba(255,255,255,0.1);
            --chart-bar: linear-gradient(180deg, var(--accent), var(--accent-secondary));
        }
        body.light-theme {
            --bg: #f0f2f5;
            --bg-card: #ffffff;
            --bg-secondary: #e6e9f0;
            --text: #1a1a2e;
            --text-secondary: #4a4a6a;
            --accent: #0099cc;
            --accent-secondary: #8e44ad;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --chart-bg: rgba(0,0,0,0.05);
            --chart-bar: linear-gradient(180deg, #3498db, #9b59b6);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        .header {
            background: var(--bg-card);
            padding: 16px;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .streak {
            background: rgba(255, 170, 0, 0.2);
            color: var(--warning);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 170, 0, 0.3);
        }
        .main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 80px;
        }
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: background 0.3s, border 0.3s;
        }
        h2 {
            color: var(--accent);
            margin-bottom: 16px;
            font-size: 1.3rem;
        }
        h3 {
            color: var(--text);
            margin-bottom: 12px;
            font-size: 1.1rem;
        }
        .btn {
            display: inline-block;
            padding: 14px 20px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            width: 100%;
            margin-bottom: 10px;
            transition: all 0.3s;
            touch-action: manipulation;
        }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text);
            border: 1px solid var(--accent);
        }
        .btn-success {
            background: var(--success);
            color: var(--bg);
        }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-warning {
            background: var(--warning);
            color: black;
        }
        .btn-small {
            padding: 8px 12px;
            font-size: 0.9rem;
            width: auto;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
        }
        .stat {
            background: var(--bg-secondary);
            padding: 15px 10px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #333;
        }
        .stat-value {
            font-size: 1.8rem;
            color: var(--accent);
            font-weight: bold;
        }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin: 16px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
            border-radius: 4px;
            transition: width 0.3s;
        }
        .ticket-item {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            border-left: 4px solid var(--accent);
            transition: all 0.3s;
        }
        .ticket-item:hover {
            transform: translateX(5px);
            background: #32324a;
        }
        .ticket-item.completed {
            border-left-color: var(--success);
        }
        .ticket-item.in-progress {
            border-left-color: var(--warning);
        }
        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .ticket-number {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent);
        }
        .ticket-status {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .ticket-status.completed {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success);
        }
        .ticket-status.in-progress {
            background: rgba(255, 170, 0, 0.2);
            color: var(--warning);
        }
        .ticket-status.pending {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }
        .ticket-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .question-item {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            border-left: 4px solid var(--accent);
            transition: all 0.3s;
        }
        .question-item:hover {
            transform: translateX(5px);
            background: #32324a;
        }
        .question-item.completed {
            border-left-color: var(--success);
            opacity: 0.8;
        }
        .question-number {
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        .question-text {
            color: var(--text);
            font-size: 1rem;
            line-height: 1.4;
        }
        .question-meta {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .answer {
            margin: 20px 0;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            color: var(--text);
            white-space: pre-line;
            line-height: 1.6;
            border-left: 4px solid var(--accent);
            font-size: 1rem;
        }
        .hidden {
            display: none;
        }
        .search-container {
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 2px solid #333;
            border-radius: 30px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .filter-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 16px 0;
        }
        .filter-chip {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid #333;
            transition: all 0.3s;
        }
        .filter-chip.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }
        .flashcard-container {
            perspective: 1000px;
            margin: 20px 0;
            min-height: 300px;
        }
        .flashcard {
            width: 100%;
            min-height: 250px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            min-height: 250px;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 30px;
            border-radius: 20px;
            background: var(--bg-card);
            border: 2px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }
        .flashcard-back {
            transform: rotateY(180deg);
            background: var(--bg-secondary);
        }
        .flashcard-progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }
        .periodic-table-container {
            overflow-x: auto;
            margin: 20px 0;
        }
        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 2px;
            min-width: 800px;
        }
        .element {
            aspect-ratio: 1;
            padding: 2px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.7rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .element:hover {
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 0 15px currentColor;
        }
        .element-symbol {
            font-weight: bold;
            font-size: 0.9rem;
        }
        .element-number {
            font-size: 0.6rem;
            opacity: 0.8;
        }
        .element.nonmetal { background: var(--nonmetal); color: #000; }
        .element.noble-gas { background: var(--noble-gas); color: #000; }
        .element.alkali-metal { background: var(--alkali-metal); color: #000; }
        .element.alkaline-earth { background: var(--alkaline-earth); color: #000; }
        .element.transition { background: var(--transition); color: #000; }
        .element.lanthanide { background: var(--lanthanide); color: #fff; }
        .element.actinide { background: var(--actinide); color: #fff; }
        .element.metalloid { background: var(--metalloid); color: #000; }
        .element.post-transition { background: var(--post-transition); color: #000; }
        .element-detail {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-card);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 30px;
            z-index: 1000;
            max-width: 90%;
            width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .element-detail h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .element-detail table {
            width: 100%;
            margin: 20px 0;
        }
        .element-detail td {
            padding: 8px;
            border-bottom: 1px solid #333;
        }
        .element-detail td:first-child {
            color: var(--accent);
            font-weight: bold;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }
        .calc-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 2px solid #333;
            border-radius: 12px;
            color: var(--text);
            font-size: 1.1rem;
            margin: 10px 0;
            font-family: monospace;
        }
        .calc-result {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            margin: 10px 0;
            border-left: 4px solid var(--accent);
        }
        .activity-series {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 16px 0;
        }
        .metal {
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid var(--warning);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.9rem;
        }
        .solubility-table {
            overflow-x: auto;
            margin: 16px 0;
        }
        .solubility-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .solubility-table th, .solubility-table td {
            border: 1px solid #333;
            padding: 6px;
            text-align: center;
        }
        .solubility-table th {
            background: var(--bg-secondary);
            color: var(--accent);
        }
        .solubility-R { color: var(--success); font-weight: bold; }
        .solubility-M { color: var(--warning); font-weight: bold; }
        .solubility-N { color: var(--danger); font-weight: bold; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid #333;
            padding: 8px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .nav-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            overflow-x: auto;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            border-radius: 12px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .nav-item.active {
            color: var(--accent);
            background: rgba(0, 212, 255, 0.1);
        }
        .nav-icon {
            font-size: 1.4rem;
        }
        .quiz-option {
            background: var(--bg-secondary);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .quiz-option:hover {
            border-color: var(--accent);
        }
        .quiz-option.selected {
            border-color: var(--accent);
            background: rgba(0, 212, 255, 0.1);
        }
        .quiz-option.correct {
            border-color: var(--success);
            background: rgba(0, 255, 136, 0.1);
        }
        .quiz-option.wrong {
            border-color: var(--danger);
            background: rgba(255, 68, 68, 0.1);
        }
        .quiz-marker {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .note-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid #333;
            border-radius: 12px;
            color: var(--text);
            margin: 10px 0;
            resize: vertical;
            min-height: 80px;
        }
        .bookmark-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--warning);
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 16px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .toast {
            position: fixed;
            top: 70px;
            left: 20px;
            right: 20px;
            background: var(--accent);
            color: var(--bg);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            animation: slideDown 0.3s;
            font-weight: bold;
        }
        .toast.success {
            background: var(--success);
        }
        .toast.error {
            background: var(--danger);
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .chart-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 120px;
            margin: 20px 0;
            padding: 10px;
            background: var(--chart-bg);
            border-radius: 12px;
        }
        .chart-bar {
            width: 30px;
            background: var(--chart-bar);
            border-radius: 6px 6px 0 0;
            transition: height 0.3s;
            position: relative;
        }
        .chart-bar::after {
            content: attr(data-value);
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .chart-day {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 5px;
            color: var(--text-secondary);
        }
        .theme-switch {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .theme-option {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: var(--bg-secondary);
            border-radius: 30px;
            cursor: pointer;
            border: 1px solid var(--accent);
        }
        .theme-option.active {
            background: var(--accent);
            color: var(--bg);
        }
        .exam-timer {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--warning);
            text-align: center;
            margin: 10px 0;
        }
        .exam-warning {
            color: var(--danger);
        }
        @media (max-width: 480px) {
            .grid-3 { grid-template-columns: repeat(2, 1fr); }
            .grid-4 { grid-template-columns: repeat(3, 1fr); }
            .stats-grid { gap: 8px; }
            .stat-value { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        (function() {
            // ДАННЫЕ
            const questions = [
                { id: 1, number: 1, type: 'theory', text: 'Периодический закон и периодическая система химических элементов Д.И. Менделеева. Значение для науки.', answer: '1вопрос\n\nПериодический закон: свойства элементов и веществ зависят от заряда ядер атомов.\n\nОснова: порядковый номер = заряд ядра. Периодичность объясняется повторяемостью электронных конфигураций.\n\nЗначение: систематизация элементов, предсказание свойств, развитие атомной физики, философское и практическое значение.' },
                { id: 2, number: 2, type: 'practice', text: 'Напишите структурные формулы веществ: 2-метилпропановая кислота, 3,4-диметилпентановая кислота', answer: '📌 2-метилпропановая кислота:\nCH₃-CH-COOH\n     |\n     CH₃\n\n📌 3,4-диметилпентановая кислота:\nCH₃-CH-CH-CH₂-COOH\n     |   |\n     CH₃ CH₃' },
                { id: 3, number: 3, type: 'theory', text: 'Предельные углеводороды (Алканы). Общая формула, строение. Химические свойства метана. Применение.', answer: '3 вопрос\n\nАлканы: CₙH₂ₙ₊₂, sp³-гибридизация, σ-связи.\n\nСвойства метана: горение, пиролиз, галогенирование, нитрование.' },
                { id: 4, number: 4, type: 'practice', text: 'Как получить из карбида кальция 1,2-дихлорэтан?', answer: '1) CaC₂ + 2H₂O → C₂H₂ (ацетилен) + Ca(OH)₂\n2) C₂H₂ + H₂ (катализатор) → C₂H₄ (этилен)\n3) C₂H₄ + Cl₂ → C₂H₄Cl₂ (1,2-дихлорэтан)' },

            // Калькулятор
            function calculateMolarMass(formula) {
                const masses = { H:1.008, He:4.0026, Li:6.94, Be:9.0122, B:10.81, C:12.011, N:14.007, O:15.999, F:18.998, Ne:20.180, Na:22.990, Mg:24.305, Al:26.982, Si:28.085, P:30.974, S:32.06, Cl:35.45, Ar:39.948, K:39.098, Ca:40.078 };
                let mass = 0, current = '', num = '';
                for (let i = 0; i < formula.length; i++) {
                    const c = formula[i];
                    if (c.match(/[A-Z]/)) {
                        if (current) mass += (masses[current] || 0) * (parseInt(num) || 1);
                        current = c; num = '';
                    } else if (c.match(/[a-z]/)) current += c;
                    else if (c.match(/[0-9]/)) num += c;
                }
                if (current) mass += (masses[current] || 0) * (parseInt(num) || 1);
                return mass ? mass.toFixed(3) + ' г/моль' : 'Не удалось рассчитать';
            }

            function calculateBondType(el1, el2) {
                const en = { H:2.20, Li:0.98, Be:1.57, B:2.04, C:2.55, N:3.04, O:3.44, F:3.98, Na:0.93, Mg:1.31, Al:1.61, Si:1.90, P:2.19, S:2.58, Cl:3.16, K:0.82, Ca:1.00, Fe:1.83, Cu:1.90, Zn:1.65, Br:2.96, Ag:1.93 };
                if (!en[el1] || !en[el2]) return 'Неизвестные элементы';
                const diff = Math.abs(en[el1] - en[el2]);
                if (diff < 0.4) return 'Ковалентная неполярная';
                if (diff < 1.7) return 'Ковалентная полярная';
                return 'Ионная';
            }

            function getSolubility(cation, anion) {
                const soluble = ['Na⁺', 'K⁺', 'NH₄⁺'];
                if (soluble.includes(cation)) return 'Р';
                if (cation === 'Ag⁺' && ['Cl⁻','Br⁻','I⁻'].includes(anion)) return 'Н';
                if (anion === 'NO₃⁻') return 'Р';
                if (anion === 'SO₄²⁻' && cation === 'Ba²⁺') return 'Н';
                if (anion === 'CO₃²⁻' && !soluble.includes(cation)) return 'Н';
                if (anion === 'PO₄³⁻' && !soluble.includes(cation)) return 'Н';
                if (anion === 'S²⁻' && !soluble.includes(cation)) return 'Н';
                if (anion === 'OH⁻' && !soluble.includes(cation)) return 'Н';
                return '?';
            }

            function renderFlashcards() {
                let questionsToStudy = flashcardMode === 'unlearned' ? questions.filter(q => !studiedQuestions.has(q.id)) : flashcardMode === 'bookmarks' ? questions.filter(q => bookmarks.has(q.id)) : [...questions];

                flashcardSession = { list: questionsToStudy, index: 0, flipped: false };

                function renderCard() {
                    if (!flashcardSession) return;
                    const session = flashcardSession;
                    if (session.index >= session.list.length) {
                        showToast('🎉 Все карточки пройдены!', 'success');
                        navigateTo('flashcards');
                        return;
                    }
                    const q = session.list[session.index];
                    const html = `${renderHeader()}<div class="main-content"><button class="back-btn" onclick="navigateTo('main')">← На главную</button><div class="card"><div class="flashcard-progress"><span>${session.index+1}/${session.list.length}</span><div class="filter-chips" style="margin:0;"><span class="filter-chip ${flashcardMode==='all'?'active':''}" onclick="setFlashcardMode('all')">Все</span><span class="filter-chip ${flashcardMode==='unlearned'?'active':''}" onclick="setFlashcardMode('unlearned')">Новые</span><span class="filter-chip ${flashcardMode==='bookmarks'?'active':''}" onclick="setFlashcardMode('bookmarks')">⭐</span></div></div><div class="flashcard-container"><div class="flashcard ${session.flipped?'flipped':''}" id="flashcard" onclick="toggleFlashcard()"><div class="flashcard-front"><div style="margin-bottom:20px;">${q.type==='theory'?'📚':'⚗️'}</div><div style="font-size:1.1rem;">${q.text}</div><div style="margin-top:20px;color:#666;">Нажмите, чтобы перевернуть</div></div><div class="flashcard-back"><div style="white-space:pre-line;">${q.answer}</div></div></div></div><div class="grid-2" style="margin-top:20px;"><button class="btn btn-secondary" onclick="flashcardPrev()">← Назад</button><button class="btn btn-secondary" onclick="flashcardNext()">Вперед →</button><button class="btn btn-success" onclick="flashcardMarkLearned(${q.id})">✅ Знаю</button><button class="btn btn-warning" onclick="flashcardSkip()">⏭️ Пропустить</button></div></div></div>${renderBottomNav()}`;
                    document.getElementById('app').innerHTML = html;
                }

                window.toggleFlashcard = function() {
                    if (flashcardSession) {
                        flashcardSession.flipped = !flashcardSession.flipped;
                        renderCard();
                    }
                };
                window.flashcardPrev = function() {
                    if (flashcardSession) {
                        flashcardSession.index--;
                        if (flashcardSession.index < 0) flashcardSession.index = flashcardSession.list.length - 1;
                        flashcardSession.flipped = false;
                        renderCard();
                    }
                };
                window.flashcardNext = function() {
                    if (flashcardSession) {
                        flashcardSession.index++;
                        if (flashcardSession.index >= flashcardSession.list.length) flashcardSession.index = 0;
                        flashcardSession.flipped = false;
                        renderCard();
                    }
                };
                window.flashcardMarkLearned = function(id) {
                    if (flashcardSession) {
                        if (!studiedQuestions.has(id)) markAsStudied(id);
                        flashcardSession.list.splice(flashcardSession.index, 1);
                        if (flashcardSession.index >= flashcardSession.list.length) flashcardSession.index = 0;
                        flashcardSession.flipped = false;
                        renderCard();
                    }
                };
                window.flashcardSkip = function() {
                    if (flashcardSession) {
                        flashcardSession.index++;
                        if (flashcardSession.index >= flashcardSession.list.length) flashcardSession.index = 0;
                        flashcardSession.flipped = false;
                        renderCard();
                    }
                };
                renderCard();
            }

            function renderQuiz() {
                const quiz = [...quizQuestions].sort(() => Math.random() - 0.5);

                    if (index >= quiz.length) return showResults();

                    document.querySelectorAll('.quiz-option').forEach(opt => opt.style.pointerEvents = 'none');

            // Экзамен
            function startExam() {
                const tickets = getTickets();
                let selectedTickets = prompt('Введите номера билетов через запятую (например: 1,3,5) или "all" для всех билетов:', 'all');
                if (!selectedTickets) return;
                let ticketNumbers = [];
                if (selectedTickets.toLowerCase() === 'all') {
                    ticketNumbers = tickets.map(t => t.number);
                } else {
                    ticketNumbers = selectedTickets.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n) && n > 0 && n <= tickets.length);
                }
                if (ticketNumbers.length === 0) { showToast('Нет выбранных билетов', 'error'); return; }
                const examQuestions = [];
                ticketNumbers.forEach(num => {
                    const t = tickets.find(t => t.number === num);
                    if (t) {
                        if (t.theory) examQuestions.push(t.theory);
                        if (t.practice) examQuestions.push(t.practice);
                    }
                });
                if (examQuestions.length === 0) return;
                runExam(examQuestions, `Экзамен (билеты ${ticketNumbers.join(', ')})`);
            }

            function runExam(questionsList, title) {
                let index = 0;
                let score = 0;
                let timeLeft = questionsList.length * 60;
                let timerInterval;
                let examFinished = false;

                function formatTime(sec) {
                    const m = Math.floor(sec / 60);
                    const s = sec % 60;
                    return `${m}:${s < 10 ? '0' : ''}${s}`;
                }

                function showExamQuestion() {
                    if (index >= questionsList.length || examFinished) {
                        finishExam();
                        return;
                    }
                    const q = questionsList[index];
                    const html = `
                        ${renderHeader()}
                        <div class="main-content">
                            <button class="back-btn" onclick="cancelExam()">← Прервать экзамен</button>
                            <div class="card">
                                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                                    <span>Вопрос ${index+1}/${questionsList.length}</span>
                                    <span class="exam-timer ${timeLeft < 60 ? 'exam-warning' : ''}" id="exam-timer">⏱️ ${formatTime(timeLeft)}</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width:${((index)/questionsList.length)*100}%"></div>
                                </div>
                                <h3>${q.type === 'theory' ? '📚' : '⚗️'} ${q.text}</h3>
                                <div class="answer hidden" id="exam-answer">${q.answer.replace(/\n/g,'<br>')}</div>
                                <div class="grid-2" style="margin-top:20px;">
                                    <button class="btn btn-secondary" onclick="toggleExamAnswer()">🔍 Показать ответ</button>
                                    <button class="btn btn-success" onclick="markExamCorrect(${q.id})">✓ Верно</button>
                                    <button class="btn btn-warning" onclick="skipExamQuestion()">⏭️ Пропустить</button>
                                    <button class="btn btn-danger" onclick="cancelExam()">✕ Завершить</button>
                                </div>
                            </div>
                        </div>
                        ${renderBottomNav()}
                    `;
                    document.getElementById('app').innerHTML = html;
                }

                window.toggleExamAnswer = function() {
                    const ans = document.getElementById('exam-answer');
                    if (ans) ans.classList.toggle('hidden');
                };
                window.markExamCorrect = function(id) {
                    score++;
                    markAsStudied(id);
                    nextQuestion();
                };
                window.skipExamQuestion = function() {
                    nextQuestion();
                };
                window.cancelExam = function() {
                    clearInterval(timerInterval);
                    examFinished = true;
                    navigateTo('main');
                };
                function nextQuestion() {
                    index++;
                    showExamQuestion();
                }
                function finishExam() {
                    clearInterval(timerInterval);
                    const percent = Math.round((score / questionsList.length) * 100);
                    quizResults.push({ date: new Date().toISOString(), score, total: questionsList.length, percent });
                    if (quizResults.length > 20) quizResults.shift();
                    saveData();
                    document.getElementById('app').innerHTML = `
                        ${renderHeader()}
                        <div class="main-content">
                            <div class="card" style="text-align:center;">
                                <h2 style="font-size:3rem;">${percent}%</h2>
                                <p style="font-size:1.2rem;">${score}/${questionsList.length} правильных</p>
                                <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                                <div class="grid-2" style="margin-top:30px;">
                                    <button class="btn" onclick="startExam()">🔄 Новый экзамен</button>
                                    <button class="btn btn-secondary" onclick="navigateTo('main')">🏠 Главная</button>
                                </div>
                            </div>
                        </div>
                    `;
                }

                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        finishExam();
                    } else {
                        const timerEl = document.getElementById('exam-timer');
                        if (timerEl) {
                            timerEl.textContent = `⏱️ ${formatTime(timeLeft)}`;
                            timerEl.classList.toggle('exam-warning', timeLeft < 60);
                        }
                    }
                }, 1000);

                showExamQuestion();
            }

            // Экспорт CSV
            function exportToCSV() {
                const stats = getStats();
                const data = [
                    ['Дата экспорта', new Date().toLocaleString()],
                    ['Всего вопросов', stats.total],
                    ['Изучено', stats.studied],
                    ['Прогресс %', stats.percent],
                    ['Теория изучено', stats.theoryStudied],
                    ['Практика изучено', stats.practiceStudied],
                    ['Избранное', stats.bookmarksCount],
                    ['Streak', stats.streak],
                    ['Время занятий (мин)', stats.studyTime],
                    ['Тестов пройдено', quizResults.length],
                    [],
                    ['Детали по вопросам:'],
                    ['ID', 'Номер', 'Тип', 'Изучен', 'В избранном']
                ];
                questions.forEach(q => {
                    data.push([q.id, q.number, q.type, studiedQuestions.has(q.id) ? 'Да' : 'Нет', bookmarks.has(q.id) ? 'Да' : 'Нет']);
                });
                const csv = data.map(row => row.join(',')).join('\n');
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'chemexam_progress.csv';
                a.click();
                URL.revokeObjectURL(url);
                showToast('📊 CSV экспортирован', 'success');
            }

            function exportData() {
                const data = { studied: [...studiedQuestions], bookmarks: [...bookmarks], notes, streak, studyTime, quizResults, dailyActivity, theme };
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
                a.download = 'chemexam_backup.json';
                a.click();
                showToast('📤 Экспортировано JSON', 'success');
            }

            function importData() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = e => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = e => {
                        try {
                            const data = JSON.parse(e.target.result);
                            studiedQuestions = new Set(data.studied || []);
                            bookmarks = new Set(data.bookmarks || []);
                            notes = data.notes || {};
                            streak = data.streak || 0;
                            studyTime = data.studyTime || 0;
                            quizResults = data.quizResults || [];
                            dailyActivity = data.dailyActivity || {};
                            theme = data.theme || 'dark';
                            applyTheme();
                            saveData();
                            showToast('📥 Импортировано JSON', 'success');
                            navigateTo('main');
                        } catch { showToast('❌ Ошибка', 'error'); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }

            function resetProgress() {
                if (confirm('Сбросить весь прогресс?')) {
                    studiedQuestions.clear(); bookmarks.clear(); notes = {}; streak = 0; lastActive = null; studyTime = 0; quizResults = []; dailyActivity = {};
                    saveData(); showToast('🔄 Сброшено'); navigateTo('main');
                }
            }

            function showElementDetail(number) {
                const element = elements.find(e => e.number === number);
                if (!element) return;
                const detailHtml = `
                    <div class="overlay" onclick="closeElementDetail()"></div>
                    <div class="element-detail">
                        <button class="close-btn" onclick="closeElementDetail()">✕</button>
                        <h2 style="color: var(--accent);">${element.symbol} - ${element.name}</h2>
                        <table>
                            <tr><td>Атомный номер</td><td>${element.number}</td></tr>
                            <tr><td>Атомная масса</td><td>${element.mass}</td></tr>
                            <tr><td>Электронная конфигурация</td><td>${element.electron}</td></tr>
                            <tr><td>Электроотрицательность</td><td>${element.electronegativity}</td></tr>
                            <tr><td>Температура плавления</td><td>${element.melting}°C</td></tr>
                            <tr><td>Температура кипения</td><td>${element.boiling}°C</td></tr>
                            <tr><td>Плотность</td><td>${element.density} г/см³</td></tr>
                            <tr><td>Год открытия</td><td>${element.year}</td></tr>
                        </table>
                        <button class="btn btn-secondary" onclick="closeElementDetail()">Закрыть</button>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', detailHtml);
            }

            function closeElementDetail() {
                document.querySelector('.overlay')?.remove();
                document.querySelector('.element-detail')?.remove();
            }

            function calcMolarMass() {
                const formula = document.getElementById('formula-input').value;
                if (!formula) return;
                document.getElementById('mass-result').innerHTML = calculateMolarMass(formula);
            }
            function calcBondType() {
                const el1 = document.getElementById('element1').value, el2 = document.getElementById('element2').value;
                if (!el1 || !el2) return;
                document.getElementById('bond-result').innerHTML = calculateBondType(el1, el2);
            }
            function calcSolubility() {
                const cation = document.getElementById('cation').value, anion = document.getElementById('anion').value;
                if (!cation || !anion) return;
                const sol = getSolubility(cation, anion);
                const texts = { 'Р':'Растворимо', 'М':'Малорастворимо', 'Н':'Нерастворимо', '?':'Нет данных' };
                const colors = { 'Р':'var(--success)', 'М':'var(--warning)', 'Н':'var(--danger)', '?':'#888' };
                document.getElementById('solubility-result').innerHTML = `Соль ${cation}${anion}: <strong style="color:${colors[sol]}">${texts[sol]}</strong>`;
            }

            function randomQuestion() {
                const randomId = questions[Math.floor(Math.random() * questions.length)].id;
                showQuestion(randomId);
            }

            function navigateTo(page) {
                currentPage = page;
                currentSearch = '';
                currentFilter = 'all';
                let content = '';
                if (page === 'main') content = renderMain();
                else if (page === 'tickets') content = renderTickets();
                else if (page === 'theory') content = renderTheory();
                else if (page === 'practice') content = renderPractice();
                else if (page === 'bookmarks') content = renderBookmarks();
                else if (page === 'quiz') { renderQuiz(); return; }
                else if (page === 'flashcards') { renderFlashcards(); return; }
                else if (page === 'periodic') content = renderPeriodic();
                else if (page === 'tools') content = renderTools();
                else content = renderMain();
                document.getElementById('app').innerHTML = content;
            }

            function showTicket(number) {
                document.getElementById('app').innerHTML = renderTicket(number);
            }

            function showQuestion(id) {
                renderQuestion(id);
            }

            function setFilter(filter) { currentFilter = filter; rerender(); }
            function setFlashcardMode(mode) { flashcardMode = mode; navigateTo('flashcards'); }
            function searchQuestions(query) { currentSearch = query; rerender(); }

            function rerender() {
                if (currentPage === 'theory') navigateTo('theory');
                else if (currentPage === 'practice') navigateTo('practice');
                else if (currentPage === 'bookmarks') navigateTo('bookmarks');
                else if (currentPage === 'tickets') navigateTo('tickets');
                else navigateTo(currentPage);
            }

            // Глобальные функции для onclick
            window.navigateTo = navigateTo;
            window.showTicket = showTicket;
            window.showQuestion = showQuestion;
            window.markAsStudied = markAsStudied;
            window.toggleBookmark = toggleBookmark;
            window.randomQuestion = randomQuestion;
            window.setFilter = setFilter;
            window.setFlashcardMode = setFlashcardMode;
            window.searchQuestions = searchQuestions;
            window.setTheme = setTheme;
            window.startExam = startExam;
            window.exportToCSV = exportToCSV;
            window.exportData = exportData;
            window.importData = importData;
            window.resetProgress = resetProgress;
            window.showElementDetail = showElementDetail;
            window.closeElementDetail = closeElementDetail;
            window.calcMolarMass = calcMolarMass;
            window.calcBondType = calcBondType;
            window.calcSolubility = calcSolubility;
            window.goBack = goBack;
            // Для тестов и экзамена они уже определены выше как window-функции

            // Инициализация
            loadData();
            navigateTo('main');
        })();
    </script>
</body>
</html>
