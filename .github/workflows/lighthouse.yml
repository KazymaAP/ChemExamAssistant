name: Lighthouse CI
on: [pull_request]
jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm i -g @lhci/cli
      - run: python3 -m http.server 4173 &
      - run: lhci autorun --collect.url=http://localhost:4173 || true
